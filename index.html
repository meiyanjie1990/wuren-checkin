<!DOCTYPE html>
<html lang="zh-CN">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fef9f3;--card:#fff;--text:#3d3427;--sub:#9b8e7c;--accent:#f0883e;--accent2:#55a392;--border:#efe8db}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#fef9f3,#fdf5ea,#faf3e6);color:var(--text);min-height:100vh;padding-bottom:80px}
header{background:linear-gradient(135deg,#fffbf5,#fff8ef);padding:14px 20px;text-align:center;position:sticky;top:0;z-index:10;border-bottom:1px solid #f0e8d8}
header h1{font-size:22px;font-weight:800}
.user-bar{margin-top:8px;display:flex;gap:6px;align-items:center;justify-content:center;flex-wrap:wrap}
.user-bar select{padding:7px 12px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;font-family:inherit;background:#fffdf9}
nav.tabs{display:flex;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.95);border-top:1px solid var(--border);z-index:10}
nav.tabs button{flex:1;padding:10px 4px 8px;border:none;background:none;font-size:11px;color:var(--sub);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
nav.tabs button .ico{font-size:20px}
nav.tabs button.active{color:var(--accent);font-weight:700}
.page{display:none;padding:14px}
.page.active{display:block;animation:fadeIn 0.25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-8px)}}
.card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 16px rgba(80,50,20,0.05);border:1px solid var(--border)}
.card.self{border:2px solid var(--accent);background:linear-gradient(135deg,#fffdf7,#fff9f0)}
.card h3{font-size:16px;margin-bottom:10px}
.person-name{font-size:16px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.score-row{display:flex;gap:10px;margin-bottom:8px}
.score-block{flex:1}
.score-block .label{font-size:12px;color:var(--sub);margin-bottom:5px;font-weight:600}
.score-block .label .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:4px;vertical-align:middle}
.score-block .label .dot.s{background:var(--accent2)}
.score-block .label .dot.e{background:var(--accent)}
.score-btns{display:flex;gap:4px}
.score-btns button{flex:1;min-width:36px;padding:10px 3px;border:2px solid #e8e1d4;border-radius:10px;background:#fdfbf6;font-size:14px;font-weight:700;color:var(--text);cursor:pointer}
.score-btns button.sel{border-color:var(--accent);background:#fff3e8;color:var(--accent)}
.note-input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;margin-top:6px;font-family:inherit;resize:none;height:38px;background:#fdfbf7}
.done-badge{display:inline-block;background:#e6f5ef;color:#388e6b;font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600}
.sunday-lock{text-align:center;color:#d3545a;font-size:13px;padding:12px;background:#fef7f7;border-radius:12px;margin:10px 0}
.sunday-winner{text-align:center;color:#27ae60;font-size:13px;padding:12px;background:#f2faf6;border-radius:12px;margin:10px 0}
.week-table{width:100%;border-collapse:collapse;font-size:12px}
.week-table th,.week-table td{padding:6px 3px;text-align:center;border-bottom:1px solid #f5f0e8}
.week-table th{font-weight:700;font-size:11px;color:var(--sub)}
.week-table td:first-child{text-align:left;font-weight:600}
.btn{display:inline-block;padding:10px 20px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}
.btn-saved{background:var(--accent2)!important;color:#fff!important;pointer-events:none}
.btn-outline{background:#fff;border:2px solid var(--accent);color:var(--accent)}
.btn-small{padding:6px 14px;font-size:12px;border-radius:9px}
.btn-block{display:block;width:100%}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.encourage-box{background:linear-gradient(135deg,#fffbf5,#fff6ea);border-left:4px solid var(--accent);padding:16px 18px;border-radius:0 14px 14px 0;margin:12px 0;font-size:14px;line-height:1.8}
.encourage-box .greeting{font-size:17px;font-weight:800;margin-bottom:6px}
.encourage-box .body{color:#5c4d38}
.encourage-box .humor{color:#9b8e7c;font-style:italic;margin-top:6px}
.pred-input-row{display:flex;align-items:center;gap:10px;margin:6px 0}
.pred-input-row input{width:70px;padding:9px;border:2px solid var(--border);border-radius:10px;font-size:15px;text-align:center;font-family:inherit}
.pred-input-row .name{flex:1;font-size:14px;font-weight:600}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#3d3427;color:#fff;padding:12px 24px;border-radius:24px;font-size:14px;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
.sync-bar{font-size:11px;color:var(--sub);text-align:center;margin-top:5px;min-height:16px}
.ai-tag{font-size:9px;background:#f0883e;color:#fff;padding:1px 6px;border-radius:8px;vertical-align:middle;margin-left:4px}
</style>
</head>

<div class="page" id="page-weekly"><div class="card"><h3>📊 本周战报</h3><div id="weekRange" style="font-size:13px;color:var(--sub);margin-bottom:10px"></div><div style="overflow-x:auto" id="weekTable"></div><div class="summary-card" id="weekSummary"></div></div><div class="card"><h3>🔮 上周预测揭晓</h3><div id="lastPredResult" style="font-size:14px;line-height:1.8"></div></div></div>

<div class="page" id="page-predict"><div class="card"><h3>🔮 预测下周总分</h3><div id="predInfo" style="font-size:13px;color:var(--sub);margin-bottom:12px;line-height:1.6"></div><div id="predInputs"></div><button class="btn btn-primary btn-block" onclick="savePredictions()" style="margin-top:12px">📝 提交预测</button></div><div class="card"><h3>📜 预测历史</h3><div id="predHistory"></div></div></div>

<div class="page" id="page-history"><div class="card"><h3>📋 导出个人记录</h3><div id="exportList"></div></div><div class="card"><h3>📈 近期记录</h3><div id="historyOverview"></div></div></div>

<nav class="tabs">

<script>

var REPO='meiyanjie1990/wuren-checkin';

function gm(d){d=new Date(d);d.setHours(0,0,0,0);var day=d.getDay();d.setDate(d.getDate()+(day===0?-6:1-day));return d}
function gs(m){var s=new Date(m);s.setDate(s.getDate()+6);return s}
function fd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fds(d){return (d.getMonth()+1)+'/'+d.getDate()}
function fwr(m,s){return (m.getMonth()+1)+'月'+m.getDate()+'日 - '+(s.getMonth()+1)+'月'+s.getDate()+'日'}
function isSunday(d){return d.getDay()===0}
function isSameDay(a,b){return fd(a)===fd(b)}
function hashStr(s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return Math.abs(h)}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500)}
function cu(){return document.getElementById('currentUser').value}
function cd(){return document.getElementById('checkinDate').value||fd(new Date())}

function loadLocal(){try{var d=localStorage.getItem('wuren_data');return d?JSON.parse(d):{}}catch(e){return{}}}
function saveLocal(data){_local=data;localStorage.setItem('wuren_data',JSON.stringify(data))}
function getLocal(){if(_local)return _local;var d=loadLocal();if(!d.checkins)d.checkins={};if(!d.predictions)d.predictions={};_local=d;return d}
function gpc(data,person,dateStr){if(!data.checkins[person])return null;return data.checkins[person][dateStr]||null}

async function fetchRemote(){
  try{
    var resp=await fetch('https://api.github.com/repos/'+REPO+'/contents/data.json',{headers:{Authorization:'token '+TK,Accept:'application/vnd.github.v3+json'},cache:'no-cache'});
    if(!resp.ok)return null;
    var json=await resp.json();_sha=json.sha;
    return JSON.parse(decodeURIComponent(escape(atob(json.content.replace(/\s/g,'')))));
  }catch(e){return null}
}
async function pushRemote(data){
  var s=JSON.stringify(data,null,2);
  var c=btoa(unescape(encodeURIComponent(s)));
  var body={message:'update',content:c,branch:'main'};
  if(_sha)body.sha=_sha;
  try{
    var resp=await fetch('https://api.github.com/repos/'+REPO+'/contents/data.json',{method:'PUT',headers:{Authorization:'token '+TK,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!resp.ok){var err=await resp.json();if(err.message&&err.message.indexOf('sha')>-1){var rf=await fetch('https://api.github.com/repos/'+REPO+'/contents/data.json',{headers:{Authorization:'token '+TK,Accept:'application/vnd.github.v3+json'}});if(rf.ok){var rd=await rf.json();body.sha=rd.sha;var rt=await fetch('https://api.github.com/repos/'+REPO+'/contents/data.json',{method:'PUT',headers:{Authorization:'token '+TK,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});if(rt.ok){_sha=(await rt.json()).content.sha;return true}}}return false}
    _sha=(await resp.json()).content.sha;return true;
  }catch(e){return false}
}
async function syncNow(silent){
  var bar=document.getElementById('syncBar');bar.textContent='syncing...';
  var remote=await fetchRemote();
  if(remote){
    var local=getLocal();
    if(local.checkins)for(var p in local.checkins)for(var d in local.checkins[p]){
      var le=local.checkins[p][d];
      if(le&&le._ai&&remote.checkins&&remote.checkins[p]&&remote.checkins[p][d]&&!remote.checkins[p][d]._ai){
        remote.checkins[p][d]._ai=le._ai;
      }
    }
    saveLocal(remote);bar.textContent='OK';if(!silent){renderAll();toast('synced')}
    setTimeout(function(){bar.textContent=''},3000);return true;
  }else{bar.textContent='offline';setTimeout(function(){bar.textContent=''},4000);return false}
}
async function saveAndSync(data){saveLocal(data);await pushRemote(data);var bar=document.getElementById('syncBar');bar.textContent='OK';setTimeout(function(){bar.textContent=''},3000)}
function onUserSwitch(){localStorage.setItem('wuren_me',cu());renderCheckin()}

// AI
async function callAI(name,ss,sn,es,en,streak,wd,dow,tg){
  var parts=[];
  if(ss>0)parts.push('学习'+ss+'分'+(sn?'：'+sn:''));
  if(es>0)parts.push('运动'+es+'分'+(en?'：'+en:''));
  if(parts.length===0)return null;
  var prompt='写一句打卡鼓励，给30-40岁自律成年人。口语化、带冷幽默。要自然回应ta具体做了什么。50-80字。直接回复。\n时间：'+tg+'\n用户：'+name+'\n'+parts.join('；')+'\n连续：'+streak+'天 本周：'+wd+'天';
  try{
    var ctrl=new AbortController();setTimeout(function(){ctrl.abort()},10000);
    var resp=await fetch('https://api.deepseek.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+DS_KEY},body:JSON.stringify({model:'deepseek-chat',messages:[{role:'user',content:prompt}],max_tokens:180,temperature:0.95}),signal:ctrl.signal});
    if(!resp.ok)return null;
    var data=await resp.json();
    var reply=data.choices&&data.choices[0]?data.choices[0].message.content.trim():null;
    return (reply&&reply.length>2)?reply:null;
  }catch(e){return null}
}

// Encouragement system
var STUDY_R=[
  {kw:'英语 单词 语法 阅读 听力 口语 作文 翻译 english'.split(' '),r:['英语慢功夫，今天这步走得很稳','语言每天碰一点比周末猛攻有效得多','学语言的快乐是某天突然发现听懂了']},
  {kw:'书 看书 读 小说 文学 历史 哲学 传记'.split(' '),r:['阅读是最低成本的旅行','一本书半小时比刷手机充实太多']},
  {kw:'考试 复习 备考 考证 职称'.split(' '),r:['成年人主动学习比学生时代酷多了','不是为了分数是为了更好的自己']},
  {kw:'博物馆 看展 展览 美术馆 画廊'.split(' '),r:['逛博物馆是最好的通识教育','看展的人眼睛里装着另一个世界']},
  {kw:'写作 日记 公众号 随笔'.split(' '),r:['把想法写成文字是对思考的二次加工','写作是给自己整理思绪']},
  {kw:'理财 股票 基金 投资 经济学'.split(' '),r:['搞懂钱的规律是成年人最重要的功课','理财也是学习——每一块砖都算数']},
  {kw:'育儿 亲子 孩子 带娃 陪娃 绘本'.split(' '),r:['最好的教育是陪伴','育儿也是育己']},
  {kw:'旅行 自驾 出游 攻略'.split(' '),r:['世界是一本书不旅行只读了一页','做攻略也是学习']},
];
var EXERCISE_R=[
  {kw:'跑 步 公里 km 慢跑 晨跑 夜跑'.split(' '),r:['跑步的多巴胺仅次于恋爱','每一步都不是白跑的']},
  {kw:'瑜伽 拉伸 普拉提'.split(' '),r:['瑜伽人的从容是我不急但我一直在','拉伸的不只是身体还有一天的紧张']},
  {kw:'跳绳'.split(' '),r:['跳绳性价比最高——一根绳全身燃','10分钟跳绳等于半小时慢跑']},
  {kw:'游泳 游 泳池'.split(' '),r:['游泳是唯一不会出汗的运动','在水里的时光世界安静了']},

  {kw:'走路 散步 遛 溜达'.split(' '),r:['走路是最被低估的运动','散步的哲学：慢下来']},
  {kw:'骑车 单车 骑行 自行车'.split(' '),r:['风从耳边过自由从心里来','两个轮子去的地方四轮永远到不了']},
  {kw:'爬山 登山 徒步 户外 郊游'.split(' '),r:['山就在那里你去了它就矮了一截','户外是最好的健身房']},
  {kw:'带娃 遛娃 抱娃 陪娃'.split(' '),r:['带娃是最高强度的有氧运动懂的都懂','看看手腕上的娃就知道运动量了']},
  {kw:'太极 八段锦 五禽戏 气功'.split(' '),r:['传统养生功法温和但持久','国潮养生！']},
  {kw:'跳舞 跳操 hiit tabata 有氧'.split(' '),r:['成年人挤出时间运动本身就是胜利','跟着音乐流汗时间过得快']},
];

function noteReact(note,type){
  if(!note||note.trim()==='')return null;
  var n=note.toLowerCase();
  var list=type==='study'?STUDY_R:EXERCISE_R;
  for(var i=0;i<list.length;i++){
    if(list[i].kw.some(function(k){return n.indexOf(k)>-1})){
      return list[i].r[hashStr(note+type)%list[i].r.length];
    }
  }
  var cleaned=note.replace(/[，,。.!！？?、\s～—\-…]+/g,' ').replace(/(今天|了|的|也|很|都|是|在|和|与|吧|呢|啊|哦|哈|嗯)/g,' ').trim();
  var words=cleaned.split(/[\s]+/).filter(function(w){return w.length>=2&&!/^[a-zA-Z0-9]+$/.test(w)});
  var hook=words.length>0?words[0].slice(0,8):'';
  if(!hook||hook.length<2)return null;
  return (type==='study'?'看到你提到'+hook+'——学什么都不白学':'用自己的方式运动——'+hook+'听起来不错');
}

function genEnc(data,dateStr,user){
  var d=new Date(dateStr+'T00:00:00');
  var hour=new Date().getHours();
  var tgKeys=['night','early','morning','noon','afternoon','evening','night'];
  var tgVals=[['夜深了','晚间好'],['早安呀','清晨好'],['上午好','咖啡时间'],['中午好','午安'],['下午好','午后时光'],['傍晚好'],['夜深了','晚间好']];
  var idx=Math.min(Math.floor(hour/3),6);
  var gs=tgVals[idx]||tgVals[0];
  var greeting=gs[hashStr(user+dateStr)%gs.length];

  if(d.getDay()===0)return '<div class="greeting">'+greeting+'，'+(user||'朋友')+'</div><div class="body">周日不打卡。一周坚持值得奖励自己。<br><strong>会休息的人才能跑更远。</strong></div><div class="humor">今天唯一任务：让自己舒服</div>';
  if(!user)return '<div class="greeting">'+greeting+'！</div><div class="body">选一下你是谁，开始打卡吧~</div>';

  var ex=gpc(data,user,dateStr);
  var streak=countStreak(data,user);
  var wd=countWeekDone(data,user);
  var dow=d.getDay()||7;

  if(ex){
    var total=(ex.study||0)+(ex.exercise||0);
    var st=ex.study||0,et=ex.exercise||0;

    if(ex._ai)return '<div class="greeting">'+greeting+'，'+user+'！<span class="ai-tag">AI</span></div><div class="body">'+ex._ai+'</div>';

    var parts=[],humor='';
    var seed=hashStr(user+dateStr);

    if(total>=3.5){parts=['<strong>'+total.toFixed(1)+'分！</strong>今天属于让人羡慕的自律人',st>0&&et>0?'学习运动双拉满自律额度已用满':'专注一项做到极致']}
    else if(total>=2){parts=['<strong>'+total.toFixed(1)+'分</strong>扎实的一天','两小时有效投入一年就是730小时']}
    else if(total>=1){parts=['<strong>'+total.toFixed(1)+'分</strong>小步快跑','重要的不是多少分是又一次选择了行动']}
    else{parts=['今天也打卡了'];humor='告诉明天的自己——你看我连这么小的日子都没放弃'}

    var sr=st>0?noteReact(ex.sNote||'','study'):null;
    var er=et>0?noteReact(ex.eNote||'','exercise'):null;
    if(sr)parts.push(sr);
    if(er)parts.push(er);
    if(streak>=14)parts.push('连续<strong>'+streak+'</strong>天！节奏刻进肌肉记忆了');
    else if(streak>=7)parts.push('连续<strong>'+streak+'</strong>天！靠谱两个字的最好解释');
    else if(streak>=3)parts.push('连续<strong>'+streak+'</strong>天了势头在起来');

    if(!humor)humor=['万物都会背叛你但每天0.5分的积累不会','打卡像种树每天浇一点水一年后回头看一片森林','三十岁以后的坚持是给自己的交代'][seed%3];

    return '<div class="greeting">'+greeting+'，'+user+'！</div><div class="body">'+parts.join('<br>')+'</div><div class="humor">'+humor+'</div>';
  }

  var tips=[],humor='';
  if(dow===1){tips=['周一最需要勇气你敢开始这周就赢了一半','新的一周给自己一个小目标'];humor='周一：一周中最被误解的一天但它需要你'}
  else if(dow===5||dow===6){tips=['周末诱惑很大但打开这个页面本身就赢了第一步','周五六的每一分都有双倍含金量'];humor='周五：身体在工位灵魂在周末但你还记得打卡就是纪律'}
  else{tips=['打卡不是考试不需要每次都满分来了就是胜利','高估一天低估百天'];humor='拖延症的本质是你不知道开始之后有多爽'}

  if(streak>=7)tips.push('连续<strong>'+streak+'</strong>天了今天再加一天！');
  return '<div class="greeting">'+greeting+'，'+user+'！</div><div class="body">'+tips.join('<br><br>')+'</div><div class="humor">'+humor+'</div>';
}

function genMini(data,dateStr,person){
  var ex=gpc(data,person,dateStr);
  if(!ex)return'';
  var total=(ex.study||0)+(ex.exercise||0);
  if(total===0)return'';
  var av=AVATARS[person]||'👤';
  if(ex._ai){var s=ex._ai.length>40?ex._ai.slice(0,40)+'...':ex._ai;return'<div style="display:flex;align-items:flex-start;gap:6px;margin-bottom:6px;padding:4px 0;border-bottom:1px solid #f5f5f5"><span style="font-size:16px">'+av+'</span><span><strong>'+person+'</strong> '+total.toFixed(1)+'分<span style="font-size:8px;background:#e8e8e8;color:#999;padding:1px 4px;border-radius:6px;margin-left:2px">AI</span><br><span style="color:#5c4d38">'+s+'</span></span></div>'}
  var r1=(ex.study||0)>0?noteReact(ex.sNote||'','study'):null;
  var r2=(ex.exercise||0)>0?noteReact(ex.eNote||'','exercise'):null;
  var r=r1||r2||'';
  var sr=r?(r.indexOf('。')>-1?r.split('。')[0]:r.slice(0,30)):'';
  return'<div style="display:flex;align-items:flex-start;gap:6px;margin-bottom:4px"><span style="font-size:16px">'+av+'</span><span><strong>'+person+'</strong> '+total.toFixed(1)+'分<br>'+sr+'</span></div>';
}

function countStreak(data,person){var s=0;var d=new Date();d.setDate(d.getDate()-1);while(d.getFullYear()>=2026){var c=gpc(data,person,fd(d));if(!c||((c.study||0)+(c.exercise||0))===0)break;s++;d.setDate(d.getDate()-1)}return s}
function countWeekDone(data,person){var today=new Date();var m=gm(today);var days=0;for(var i=0;i<6;i++){var d=new Date(m);d.setDate(d.getDate()+i);var c=gpc(data,person,fd(d));if(c&&((c.study||0)+(c.exercise||0))>0)days++}return days}

async function fillAI(data,ds){
  var hour=new Date().getHours();
  var tg=hour<7?'清晨':hour<10?'上午':hour<13?'中午':hour<17?'下午':hour<20?'傍晚':'晚上';
  for(var i=0;i<PERSONS.length;i++){
    var p=PERSONS[i];
    var ex=gpc(data,p,ds);
    if(!ex||((ex.study||0)+(ex.exercise||0))===0)continue;
    if(ex._ai)continue;
    var streak=countStreak(data,p);
    var wd=countWeekDone(data,p);
    var day=new Date(ds+'T00:00:00').getDay()||7;
    var r=await callAI(p,ex.study||0,ex.sNote||'',ex.exercise||0,ex.eNote||'',streak,wd,day,tg);
    if(r){
      var d2=getLocal();
      if(d2.checkins[p]&&d2.checkins[p][ds]){d2.checkins[p][ds]._ai=r;saveLocal(d2);pushRemote(d2).catch(function(){})}
      var ed=document.getElementById('dailyEncourage');
      if(ed&&document.getElementById('page-checkin').classList.contains('active')){ed.innerHTML=genEnc(getLocal(),ds,cu())}
    }
    await new Promise(function(rs){setTimeout(rs,1500)});
  }
}

async function savePredictions(){
  var data=getLocal();var today=new Date();if(!isSunday(today)){toast('只有周日才能提交预测');return}
  var m=gm(today);var sun=gs(m);var nm=new Date(sun);nm.setDate(nm.getDate()+1);var pk=fd(sun);
  if(!data.predictions[pk])data.predictions[pk]={weekStart:fd(nm),preds:{},actual:null,winners:[]};
  var count=0;PERSONS.forEach(function(p){var inp=document.getElementById('pred-'+p);if(inp&&inp.value!==''){data.predictions[pk].preds[p]=parseFloat(inp.value)||0;count++}});
  var ls=new Date(sun);ls.setDate(ls.getDate()-7);var lk=fd(ls);var lp=data.predictions[lk];
  if(lp&&lp.actual===null){var tm=new Date(sun);tm.setDate(tm.getDate()-6);var act=getWeekAllTotal(data,tm);lp.actual=act;if(lp.preds&&Object.keys(lp.preds).length>0){var minDiff=Infinity,winners=[];Object.keys(lp.preds).forEach(function(p){var diff=Math.abs(lp.preds[p]-act);if(diff<minDiff){minDiff=diff;winners=[p]}else if(diff===minDiff){winners.push(p)}});lp.winners=winners}}
  await saveAndSync(data);toast('saved '+count+' predictions');renderPredict()
}
function getWeekAllTotal(data,m){var t=0;PERSONS.forEach(function(p){t+=getWeekTotal(data,p,m)});return t}
function getWeekTotal(data,p,m){var t=0;for(var i=0;i<6;i++){var d=new Date(m);d.setDate(d.getDate()+i);var c=gpc(data,p,fd(d));if(c)t+=(c.study||0)+(c.exercise||0)}var sun=gs(m);var wk=fd(new Date(sun.getTime()-14*86400000));var pd=data.predictions[wk];if(pd&&pd.winners&&pd.winners.indexOf(p)>-1){var c=gpc(data,p,fd(sun));if(c)t+=(c.study||0)+(c.exercise||0)}return t}

function downloadFile(fn,c){var b=new Blob(['﻿'+c],{type:'text/plain;charset=utf-8'});var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);toast('已导出：'+fn)}

function switchTab(idx){document.querySelectorAll('.page').forEach(function(p,i){p.classList.toggle('active',i===idx)});document.querySelectorAll('nav.tabs button').forEach(function(b,i){b.classList.toggle('active',i===idx)});if(idx===0)renderCheckin();if(idx===1)renderWeekly();if(idx===2)renderPredict();if(idx===3)renderHistory()}
function renderAll(){renderCheckin();renderWeekly();renderPredict();renderHistory()}

async function checkVersion(){
  try{
    var resp=await fetch('https://api.github.com/repos/'+REPO+'/contents/version.json?t='+Date.now(),{headers:{Authorization:'token '+TK,Accept:'application/vnd.github.v3+json'},cache:'no-cache'});
    if(resp.ok){var json=await resp.json();var rv=JSON.parse(decodeURIComponent(escape(atob(json.content.replace(/\s/g,''))))).version;var lv=parseInt(localStorage.getItem('wuren_ver')||'0');if(rv>lv){var b=document.createElement('div');b.style.cssText='position:fixed;top:0;left:50%;transform:translateX(-50%);z-index:300;background:#f0883e;color:#fff;padding:10px 20px;border-radius:0 0 16px 16px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.2);animation:bounce 0.5s ease';b.textContent='New version! Click to update';b.onclick=function(){localStorage.setItem('wuren_ver',String(rv));if('serviceWorker'in navigator){navigator.serviceWorker.getRegistrations().then(function(regs){regs.forEach(function(r){r.unregister()})})}if('caches'in window){caches.keys().then(function(keys){keys.forEach(function(k){caches.delete(k)})})}location.reload(true)};document.body.appendChild(b);setTimeout(function(){if(b.parentNode)b.remove()},30000)}else{localStorage.setItem('wuren_ver',String(rv))}}
  }catch(e){}
}

async function init(){
  var sel=document.getElementById('currentUser');sel.innerHTML='<option value="">选择自己</option>'+PERSONS.map(function(p){return'<option value="'+p+'">'+p+'</option>'}).join('');
  var saved=localStorage.getItem('wuren_me');if(saved&&PERSONS.indexOf(saved)>-1)sel.value=saved;
  document.getElementById('checkinDate').value=fd(new Date());
  await syncNow(true);renderAll();checkVersion();
  if('serviceWorker'in navigator){navigator.serviceWorker.register('./sw.js').catch(function(){})}
}
init();
</script>
