<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="五仁打卡">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<meta name="theme-color" content="#F7F3EC">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link rel="manifest" href="./manifest.json">
<title>F5 · 五人手账</title>
<style>
:root{
  --parchment:#F5F1E8; --paper:#FEFCF8; --paper2:#FBF7EF;
  --ink:#2C2416; --sepia:#8B7355; --faded:#B8A88A;
  --sage:#7A9B7C; --moss:#5C724A; --rose:#C07060;
  --thread:#E4DBC7; --thread2:#EDE6D6;
  --shadow:0 2px 14px rgba(90,70,40,0.06), 0 1px 3px rgba(90,70,40,0.04);
  /* 兼容旧 JS 里引用的变量名 */
  --sub:#9A8A72; --border:#E4DBC7; --accent:#C07060; --accent2:#5C724A;
  /* 五人专属头像色 */
  --av-shi:#B98A7A; --av-mei:#C9A24B; --av-shan:#7A9B7C; --av-wang:#6E8FA0; --av-shi2:#C07060;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--parchment);color:var(--ink);
  min-height:100vh;padding-bottom:92px;
  -webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;
  background-image:radial-gradient(rgba(139,115,85,0.022) 1px, transparent 1px);
  background-size:22px 22px;
}
body::before{content:'🌿';position:fixed;top:7%;right:4%;font-size:64px;opacity:0.03;transform:rotate(-15deg);pointer-events:none;z-index:0}
body::after{content:'🍂';position:fixed;bottom:10%;left:3%;font-size:84px;opacity:0.022;transform:rotate(12deg);pointer-events:none;z-index:0}

/* ---------- Header ---------- */
header{
  background:linear-gradient(180deg,rgba(245,241,232,0.96),rgba(245,241,232,0.82));
  backdrop-filter:blur(14px);
  padding:24px 20px 14px;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--thread);
}
.top-row{display:flex;align-items:flex-start;justify-content:space-between}
.top-row h1{font-family:Georgia,'Songti SC','Noto Serif SC',serif;font-size:34px;font-weight:600;letter-spacing:-0.5px;line-height:1}
.top-row h1 .emoji{font-size:26px;margin-right:4px}
.top-row h1 .sub{display:block;font-family:-apple-system,'PingFang SC',sans-serif;font-size:10px;font-weight:500;color:var(--faded);letter-spacing:2px;margin-top:6px;text-transform:uppercase}
.top-row .date-col{text-align:right;font-size:12px;color:var(--sepia);font-style:italic;line-height:1.7}
.top-row .date-col strong{display:block;font-size:15px;color:var(--ink);font-style:normal;font-family:Georgia,'Songti SC','Noto Serif SC',serif;font-weight:600}

.sub-line{display:flex;align-items:center;gap:10px;margin-top:14px}
.sub-line select{
  border:1px solid var(--thread);background:var(--paper);font-size:13px;font-weight:600;color:var(--moss);
  font-family:inherit;cursor:pointer;outline:none;padding:8px 14px;border-radius:20px;box-shadow:var(--shadow);
  -webkit-appearance:none;appearance:none;
}
.sub-line .dot{display:none}
.streak-badge{
  display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--moss);font-weight:600;
  background:rgba(122,155,124,0.1);padding:7px 13px;border-radius:20px;
}
.streak-badge:empty{display:none}

/* ---------- Bottom nav ---------- */
nav.tabs{
  display:flex;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  background:linear-gradient(180deg,rgba(245,241,232,0.85),rgba(245,241,232,0.97));
  backdrop-filter:blur(16px);border-top:1px solid var(--thread);z-index:10;
  padding:8px 0 calc(8px + env(safe-area-inset-bottom,0));
}
nav.tabs button{
  flex:1;padding:6px 4px;border:none;background:none;position:relative;
  font-size:10px;color:var(--faded);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  font-family:inherit;font-weight:500;letter-spacing:0.3px;
}
nav.tabs button .ico{font-size:19px;opacity:.5;transition:opacity .15s}
nav.tabs button.active{color:var(--moss)}
nav.tabs button.active .ico{opacity:1}
nav.tabs button.active::before{content:'';position:absolute;top:0;width:24px;height:3px;border-radius:3px;background:var(--sage)}

/* ---------- Pages ---------- */
.page{display:none;padding:16px 18px}
.page.active{display:block;animation:fadeIn 0.25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-8px)}}

.section-label{
  font-family:Georgia,'Songti SC','Noto Serif SC',serif;font-size:13px;font-weight:600;color:var(--sepia);
  letter-spacing:0.5px;margin:6px 2px 12px;display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--thread),transparent)}

/* ---------- Cards ---------- */
.card{
  background:var(--paper);border:1px solid var(--thread);
  border-radius:20px;padding:18px;margin-bottom:12px;box-shadow:var(--shadow);position:relative;
}
.card.self{
  border:1.5px solid var(--sage);
  background:linear-gradient(180deg,rgba(122,155,124,0.05),var(--paper) 34%);
}
.card h3{font-family:Georgia,'Songti SC','Noto Serif SC',serif;font-size:18px;font-weight:600;margin-bottom:12px}

.person-name{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.person-avatar{
  display:inline-flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  font-family:Georgia,'Songti SC','Noto Serif SC',serif;font-weight:600;font-size:15px;color:#fff;
}
.person-avatar.av-shi{background:var(--av-shi)}
.person-avatar.av-mei{background:var(--av-mei)}
.person-avatar.av-shan{background:var(--av-shan)}
.person-avatar.av-wang{background:var(--av-wang)}
.person-avatar.av-shi2{background:var(--av-shi2)}

/* ---------- Score selector ---------- */
.score-row{display:flex;gap:12px;margin-bottom:12px}
.score-block{flex:1}
.score-block .label{font-size:12px;color:var(--sepia);margin-bottom:8px;font-weight:600}
.score-block .label .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.score-block .label .dot.s{background:var(--sage)}
.score-block .label .dot.e{background:var(--rose)}
.score-btns{display:flex;gap:5px}
.score-btns button{
  flex:1;min-width:36px;padding:13px 3px;border:1px solid var(--thread);
  border-radius:11px;background:var(--paper);
  font-family:Georgia,'Songti SC','Noto Serif SC',serif;font-size:16px;font-weight:600;
  color:var(--ink);cursor:pointer;transition:all 0.15s;
}
.score-btns button:hover{border-color:var(--sage)}
.score-btns button.sel{background:var(--sage);border-color:var(--sage);color:#FFF;box-shadow:0 3px 10px rgba(122,155,124,0.3)}

.note-input{
  width:100%;padding:12px 14px;border:1px solid var(--thread);border-radius:13px;
  font-size:13px;margin-top:8px;font-family:inherit;resize:vertical;min-height:56px;
  background:var(--paper2);color:var(--ink);outline:none;font-style:italic;
}
.note-input:focus{border-color:var(--sage);background:var(--paper)}
.note-input::placeholder{color:var(--faded);font-style:italic}

/* ---------- Done card detail ---------- */
.done-badge{display:inline-flex;align-items:center;gap:4px;color:var(--sage);font-size:11px;font-weight:600;margin-left:auto}
.me-tag{font-size:10px;color:var(--sage);border-bottom:1.5px solid var(--sage);font-weight:600;padding-bottom:1px}
.done-detail{display:flex;gap:22px;flex-wrap:wrap;font-size:14px;line-height:1.6}
.done-detail .k{font-size:11px;color:var(--faded);display:block;margin-bottom:1px}
.done-detail .v{font-family:Georgia,'Songti SC','Noto Serif SC',serif;font-weight:600;font-size:19px}
.done-detail .v.s{color:var(--moss)}
.done-detail .v.e{color:var(--rose)}
.done-detail .nt{font-size:12px;color:var(--sepia);font-style:italic;margin-top:3px;max-width:130px}
.sunday-lock{text-align:center;color:var(--rose);font-size:13px;padding:14px;background:rgba(192,112,96,0.06);border-radius:16px;margin:10px 0;line-height:1.6}
.sunday-winner{text-align:center;color:var(--moss);font-size:13px;padding:14px;background:rgba(122,155,124,0.07);border-radius:16px;margin:10px 0;line-height:1.6}

/* ---------- Tables ---------- */
.week-table{width:100%;border-collapse:collapse;font-size:12px}
.week-table th,.week-table td{padding:8px 3px;text-align:center;border-bottom:1px dotted var(--thread)}
.week-table th{font-weight:600;font-size:11px;color:var(--sepia);font-family:Georgia,'Songti SC','Noto Serif SC',serif}
.week-table td:first-child{text-align:left;font-weight:600}
.week-table .sun-col{color:var(--rose)}
.week-table .highlight{background:rgba(122,155,124,0.08);font-weight:600;border-radius:6px}

/* ---------- Buttons ---------- */
.btn{display:inline-block;padding:13px 22px;border:none;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s}
.btn-primary{background:var(--sage);color:#FFF;width:100%;box-shadow:0 4px 14px rgba(122,155,124,0.28)}
.btn-primary:hover{background:var(--moss)}
.btn-saved{background:var(--sepia)!important;color:#FFF!important;pointer-events:none;box-shadow:none!important}
.btn-outline{background:transparent;border:1px solid var(--thread);color:var(--sepia);border-radius:12px;box-shadow:none}
.btn-outline:hover{border-color:var(--sage);color:var(--moss)}
.btn-small{padding:7px 15px;font-size:12px;border-radius:11px}
.btn-block{display:block;width:100%}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}

/* ---------- Summary / predict ---------- */
.summary-card{margin-top:12px}
.summary-card .person-line{padding:8px 0;border-bottom:1px dotted var(--thread);font-size:13px}
.summary-card .total-line{font-family:Georgia,'Songti SC','Noto Serif SC',serif;font-weight:600;font-size:19px;padding:12px 0;color:var(--moss)}

.pred-input-row{display:flex;align-items:center;gap:10px;margin:8px 0}
.pred-input-row input{width:74px;padding:10px;border:1px solid var(--thread);border-radius:11px;font-size:15px;text-align:center;font-family:Georgia,'Songti SC','Noto Serif SC',serif;font-weight:600;background:var(--paper2);outline:none}
.pred-input-row input:focus{border-color:var(--sage);background:var(--paper)}
.pred-input-row .name{flex:1;font-size:14px;font-weight:600}

/* ---------- Misc ---------- */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:12px 24px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,0.18)}
.toast.show{opacity:1}
.sync-bar{font-size:10px;color:var(--faded);text-align:center;margin-top:6px;min-height:14px}
@media(min-width:600px){.checkin-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.checkin-grid .card{margin-bottom:0}}

/* ---------- F5 Warm Journal ---------- */
:root{--parchment:#EEE5D4;--paper:#FAF5E9;--paper2:#F6EEDF;--ink:#30291F;--sepia:#8B7967;--faded:#AA9985;--sage:#55725D;--moss:#405B49;--rose:#A95742;--thread:#D7C8B1;--thread2:#E5D9C7;--shadow:2px 3px 0 rgba(109,87,55,.08);--sub:#8B7967;--border:#D7C8B1;--accent:#A95742;--accent2:#55725D}
body{background-color:var(--parchment);background-image:linear-gradient(rgba(255,255,255,.12),rgba(255,255,255,.12)),radial-gradient(rgba(50,40,28,.08) .5px,transparent .7px);background-size:auto,7px 7px;padding-bottom:78px}
body::before,body::after{display:none}
header{position:relative;padding:25px 20px 13px;background:rgba(238,229,212,.94);backdrop-filter:blur(12px);border-bottom:0}
.journal-tape{position:absolute;width:68px;height:17px;top:11px;left:138px;background:rgba(219,198,153,.5);transform:rotate(-3deg)}
.top-row{display:grid;grid-template-columns:minmax(0,1fr) 76px;gap:12px}.top-row h1{font:500 48px/.9 Georgia,"Times New Roman",serif;letter-spacing:-2px}.top-row h1 .sub{font:10px/1.4 Georgia,serif;letter-spacing:1.7px;margin:0 0 7px;text-transform:uppercase}.date-col{width:68px;height:68px;border:1.5px solid var(--rose);border-radius:50%;display:flex;align-items:center;justify-content:center;text-align:center!important;color:var(--rose)!important;font:10px/1.45 Georgia,"Songti SC",serif!important;transform:rotate(5deg);padding:7px}.version-box{position:absolute;right:17px;top:101px;font-size:9px;color:var(--faded)}
.sub-line{margin-top:12px}.sub-line select{border-radius:2px;border-color:rgba(167,140,101,.35);box-shadow:none;background:rgba(250,245,233,.72);padding:7px 12px;color:var(--ink)}.streak-badge{border-radius:2px;background:rgba(85,114,93,.08);padding:7px 11px}.sync-bar{text-align:left;margin:7px 0 0;font-size:10px;color:var(--sage)}
.friend-strip{margin:0 15px;padding:14px 8px 12px;background:rgba(250,245,233,.62);display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:2px;border:1px solid rgba(167,140,101,.25);transform:rotate(-.25deg)}
.friend-status{text-align:center;font-size:8px;color:var(--faded);position:relative;white-space:nowrap}.friend-status .person-avatar{display:flex;width:34px;height:34px;margin:0 auto 6px;border-radius:48% 52% 47% 53%;font-size:13px}.friend-status.checked::after{content:'✓';position:absolute;top:-5px;right:3px;color:var(--sage);font:bold 14px "Comic Sans MS",cursive}.friend-status.current{font-weight:700;color:var(--ink)}.friend-status.current .person-avatar{outline:2px solid var(--paper);box-shadow:0 0 0 3px var(--ink)}
.page{padding:14px 17px}.section-label{font-family:"Songti SC","STSong",serif;font-size:18px;color:var(--ink);letter-spacing:0;margin:18px 4px 8px;border-bottom:1px solid var(--ink);padding-bottom:7px}.section-label::after{display:none}
.card{border:0;border-top:1px dashed var(--thread);border-radius:0;padding:15px 5px;margin:0;background:rgba(250,245,233,.35);box-shadow:none}.card.self{border:0;border-top:1.5px solid var(--ink);background:rgba(250,245,233,.72)}.card h3{font-family:"Songti SC","STSong",serif;font-size:18px}.person-name{font-family:"Songti SC","STSong",serif}.person-avatar{border-radius:48% 52% 50% 46%}.done-badge{font-family:Georgia,serif;font-size:12px;font-style:italic}.done-detail{padding-left:44px;margin-top:-6px;display:grid;grid-template-columns:1fr 1fr;gap:10px}.done-detail .nt{max-width:none;font-family:"Songti SC","STSong",serif;font-style:normal;line-height:1.55}.done-detail .v{font-style:italic}.me-tag{border:1px solid var(--rose);color:var(--rose);padding:1px 6px;border-radius:0}
.score-btns button,.note-input,.btn,.pred-input-row input{border-radius:2px;box-shadow:none}.score-btns button{background:rgba(250,245,233,.7)}.note-input{background:rgba(250,245,233,.72);font-style:normal}.btn-primary{background:var(--rose);box-shadow:3px 4px 0 rgba(67,43,27,.14)}.btn-primary:hover{background:#914B3B}.btn-outline{border-radius:2px}.sunday-lock,.sunday-winner{border-radius:2px;background:rgba(250,245,233,.7);border:1px dashed var(--thread)}
.week-table th,.week-table td{border-bottom:1px dashed var(--thread)}.week-table th{font-family:"Songti SC",serif}.summary-card .total-line{font-family:Georgia,"Songti SC",serif}.pred-input-row{border-bottom:1px dashed var(--thread);padding:7px 0}.summary-card .person-line{border-bottom:1px dashed var(--thread)}
nav.tabs{height:64px;background:rgba(238,229,212,.97);border-top:1px solid var(--thread);padding-top:7px}nav.tabs button{font-size:9px}nav.tabs button .ico{font-size:17px}nav.tabs button.active{color:var(--rose)}nav.tabs button.active::before{background:var(--rose);height:2px;border-radius:0}
#page-weekly>.card,#page-predict>.card,#page-history>.card{margin-bottom:15px;border:1px solid rgba(167,140,101,.25);padding:17px;background:rgba(250,245,233,.62);transform:rotate(-.1deg)}
.comment-box{margin:13px 0 0 44px;padding-top:10px;border-top:1px dotted var(--thread)}.comment-title{font-size:10px;color:var(--sepia);letter-spacing:1px;margin-bottom:7px}.comment-item{display:grid;grid-template-columns:25px 1fr auto;gap:7px;align-items:start;padding:6px 0}.comment-avatar{width:23px;height:23px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-family:"Songti SC",serif;font-size:10px}.comment-body{font-size:12px;line-height:1.55}.comment-body strong{font-size:11px;margin-right:5px}.comment-time{display:block;color:var(--faded);font-size:9px;margin-top:2px}.comment-delete{border:0;background:none;color:var(--faded);font-size:10px;padding:3px;cursor:pointer}.comment-compose{display:flex;gap:6px;margin-top:7px}.comment-compose input{flex:1;min-width:0;border:1px solid var(--thread);border-radius:2px;background:rgba(250,245,233,.7);padding:8px 9px;font-family:inherit;font-size:12px;color:var(--ink);outline:none}.comment-compose input:focus{border-color:var(--rose)}.comment-compose button{border:1px solid var(--rose);background:transparent;color:var(--rose);padding:7px 10px;font-family:inherit;font-size:11px;cursor:pointer}.comment-hint{font-size:10px;color:var(--faded);font-style:italic}
.season-card{border:1px solid rgba(167,140,101,.25);background:rgba(250,245,233,.62);padding:16px;margin-bottom:13px}.season-head{display:flex;justify-content:space-between;align-items:start;gap:10px}.season-title{font-family:"Songti SC",serif;font-size:19px;font-weight:600}.season-meta{font-size:10px;color:var(--sepia);margin-top:4px}.season-total{text-align:right;font:italic 25px/1 Georgia,serif;color:var(--sage)}.season-total small{display:block;font:9px sans-serif;color:var(--faded);margin-top:4px}.season-progress{height:5px;background:var(--thread2);margin:14px 0 8px;overflow:hidden}.season-progress span{display:block;height:100%;background:var(--rose)}.season-progress-note{display:flex;justify-content:space-between;font-size:9px;color:var(--faded)}.season-people{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-top:13px}.season-person{text-align:center;border-right:1px dotted var(--thread);font-size:9px;color:var(--faded)}.season-person:last-child{border-right:0}.season-person strong{display:block;font:italic 15px Georgia,serif;color:var(--ink);margin-bottom:3px}.season-chart{width:100%;height:64px;margin-top:13px;display:block}.season-chart .grid{stroke:var(--thread);stroke-width:1}.season-chart .line{fill:none;stroke:var(--sage);stroke-width:2}.season-chart .dot{fill:var(--rose)}.season-note{font-family:"Kaiti SC","STKaiti",serif;font-size:11px;color:var(--rose);margin-top:8px}.season-segments{display:flex;gap:7px;margin-top:10px}.season-segment{flex:1;padding:8px;border:1px dashed var(--thread);font-size:10px;color:var(--sepia)}.season-segment strong{display:block;color:var(--ink);font-family:"Songti SC",serif;font-size:13px;margin-bottom:3px}.season-empty{text-align:center;padding:14px 5px;color:var(--sepia);font-size:12px;line-height:1.7}.archive-heading{font-family:"Songti SC",serif;font-size:19px;margin:0 0 12px}.archive-sub{font-size:11px;color:var(--sepia);line-height:1.7;margin:-6px 0 14px}
@media(min-width:600px){body{max-width:480px;margin:0 auto;box-shadow:0 0 50px rgba(48,41,31,.12)}.friend-strip{margin-left:18px;margin-right:18px}}
</style>
</head>
<body>

<header>
<div class="journal-tape"></div>
<div class="top-row">
  <h1><span class="sub">FIVE FRIENDS · WEEKLY JOURNAL</span><span id="headerName">F5</span></h1>
  <div class="date-col" id="headerDate"></div><div class="version-box">v<span id="verNum">5</span> <span onclick="repairApp()" style="cursor:pointer;color:var(--rose);" title="修复加载问题">修复</span></div>
</div>
<div class="sub-line">
  <select id="currentUser" onchange="onUserSwitch()"><option value="">切换成员 ▾</option></select>
  <span class="dot"></span>
  <span class="streak-badge" id="streakBadge"></span>
</div>
<div class="sync-bar" id="syncBar"></div>
</header>
<section class="friend-strip" id="friendStatus"></section>
<div class="toast" id="toast"></div>

<div class="page active" id="page-checkin">
<div id="sundayNotice"></div>
<div style="text-align:center;margin-bottom:10px;font-size:12px;color:var(--sepia);font-style:italic">
📅 <input type="date" id="checkinDate" onchange="onDateChange()" style="padding:6px 10px;border:1px solid var(--thread);border-radius:8px;font-family:inherit;font-size:12px;background:var(--paper);color:var(--ink)">
<span id="dateBadge" style="font-size:10px;color:var(--rose);font-weight:600;margin-left:6px"></span>

// UTF-8 <-> base64 转换（替代废弃的 escape/unescape）
function b64Decode(b64){
  var bin=atob(b64.replace(/\s/g,''));
  var bytes=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}
function b64Encode(str){
  var bytes=new TextEncoder().encode(str);
  var bin='';
  for(var i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);
  return btoa(bin);
}

function avClass(p){if(p==='石维婧')return'av-shi';if(p==='梅妍洁')return'av-mei';if(p==='单兰迪')return'av-shan';if(p==='王珂')return'av-wang';return'av-shi2';}
function gm(d){d=new Date(d);d.setHours(0,0,0,0);var day=d.getDay();d.setDate(d.getDate()+(day===0?-6:1-day));return d}
function gs(m){var s=new Date(m);s.setDate(s.getDate()+6);return s}
function fd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fds(d){return (d.getMonth()+1)+'/'+d.getDate()}

function gpc(data,person,dateStr){if(!data.checkins[person])return null;return data.checkins[person][dateStr]||null}

// 递归合并：src 优先，保留不同成员、日期和预测的并发更新
function deepMerge(dst,src){
  if(src===undefined)return JSON.parse(JSON.stringify(dst));
  if(src===null||typeof src!=='object'||Array.isArray(src))return JSON.parse(JSON.stringify(src));
  var res=(dst&&typeof dst==='object'&&!Array.isArray(dst))?JSON.parse(JSON.stringify(dst)):{};
  Object.keys(src).forEach(function(k){res[k]=deepMerge(res[k],src[k])});
  return res
}
function removePath(data,path){
  var node=data;
  for(var i=0;i<path.length-1;i++){if(!node||!node[path[i]])return;node=node[path[i]]}
  if(node)delete node[path[path.length-1]]
}
function getPath(data,path){var node=data;for(var i=0;i<path.length;i++){if(node===undefined||node===null)return undefined;node=node[path[i]]}return node}
function setPath(data,path,value){var node=data;for(var i=0;i<path.length-1;i++){if(!node[path[i]]||typeof node[path[i]]!=='object')node[path[i]]={};node=node[path[i]]}node[path[path.length-1]]=JSON.parse(JSON.stringify(value))}
function mergeForUpload(remote,local,changedPaths){
  var merged=deepMerge(local,remote);
  (changedPaths||[]).forEach(function(path){var value=getPath(local,path);if(value!==undefined)setPath(merged,path,value)});
  var predictions=(remote&&remote.predictions)||{};
  Object.keys(predictions).forEach(function(week){
    var preds=predictions[week]&&predictions[week].preds;
    if(!preds)return;
    if(!merged.predictions[week])merged.predictions[week]={};
    if(!merged.predictions[week].preds)merged.predictions[week].preds={};
    Object.keys(preds).forEach(function(person){merged.predictions[week].preds[person]=preds[person]});
  });
  var comments=(remote&&remote.comments)||{};
  Object.keys(comments).forEach(function(date){
    if(!merged.comments)merged.comments={};if(!merged.comments[date])merged.comments[date]={};
    Object.keys(comments[date]||{}).forEach(function(person){
      if(!merged.comments[date][person])merged.comments[date][person]={};
      Object.keys(comments[date][person]||{}).forEach(function(id){merged.comments[date][person][id]=comments[date][person][id]});
    });
  });
  return merged
}

async function fetchRemote(){
  try{
    var resp=await fetch('https://api.github.com/repos/'+REPO+'/contents/data.json',{headers:{Authorization:'token '+TK,Accept:'application/vnd.github.v3+json'},cache:'no-cache'});
    if(!resp.ok)return null;
    var json=await resp.json();_sha=json.sha;
    return JSON.parse(b64Decode(json.content));
  }catch(e){return null}
}
async function pushRemote(data,deletedPaths,changedPaths){
  var s=JSON.stringify(data,null,2);
  var c=b64Encode(s);
  var body={message:'update',content:c,branch:'main'};
  // 如果没有 SHA，先获取最新 SHA（处理初次推送或脱机恢复）
  if(!_sha){
    try{
      var pre=await fetch('https://api.github.com/repos/'+REPO+'/contents/data.json',{headers:{Authorization:'token '+TK,Accept:'application/vnd.github.v3+json'}});
      if(pre.ok){var pd=await pre.json();_sha=pd.sha;}
    }catch(e){}
  }
  if(_sha)body.sha=_sha;
  try{
    var resp=await fetch('https://api.github.com/repos/'+REPO+'/contents/data.json',{method:'PUT',headers:{Authorization:'token '+TK,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!resp.ok){
      var err=await resp.json();
      if(err.message&&err.message.indexOf('sha')>-1){
        // SHA 冲突：拉取最新远程数据，把本地改动合并进去再推送
        var rf=await fetch('https://api.github.com/repos/'+REPO+'/contents/data.json',{headers:{Authorization:'token '+TK,Accept:'application/vnd.github.v3+json'}});
        if(rf.ok){
          var rd=await rf.json();
          var remoteData=JSON.parse(b64Decode(rd.content));
          // 合并：本地数据优先（保留自己的打卡），远程其他人的数据保留
          var merged=mergeForUpload(remoteData,data,changedPaths);
          (deletedPaths||[]).forEach(function(path){removePath(merged,path)});
          body.content=b64Encode(JSON.stringify(merged,null,2));
          body.sha=rd.sha;
          var rt=await fetch('https://api.github.com/repos/'+REPO+'/contents/data.json',{method:'PUT',headers:{Authorization:'token '+TK,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
          if(rt.ok){_sha=(await rt.json()).content.sha;return true;}
        }
      }
      console.error('pushRemote failed:',err);
      return false;
    }
    _sha=(await resp.json()).content.sha;return true;
  }catch(e){console.error('pushRemote error:',e);return false}
}
async function syncNow(silent){
  setSyncStatus('正在读取共享数据…');
  var remote=await fetchRemote();
  if(remote){
    var local=getLocal();
    // 如果有上次未推送的数据，合并到远程数据中并尝试推送
    if(localStorage.getItem('wuren_need_sync')==='1'){
      remote=mergeForUpload(remote,local);
      var pendingDeletes=JSON.parse(localStorage.getItem('wuren_pending_deletes')||'[]');
      var pendingWrites=JSON.parse(localStorage.getItem('wuren_pending_writes')||'[]');
      remote=mergeForUpload(remote,local,pendingWrites);
      pendingDeletes.forEach(function(path){removePath(remote,path)});
      saveLocal(remote);
      var ok=await pushRemote(remote,pendingDeletes,pendingWrites);
      if(ok){localStorage.removeItem('wuren_need_sync');localStorage.removeItem('wuren_pending_deletes');localStorage.removeItem('wuren_pending_writes');setSyncStatus('共享数据已更新 ✓');}
      else{setSyncStatus('⚠️ 仍有数据待同步');}
    }else{
      saveLocal(remote);setSyncStatus('共享数据已更新 ✓');
    }
    if(!silent){renderAll();}
    setSyncStatus(document.getElementById('syncBar')?document.getElementById('syncBar').textContent:'',4000);return true;
  }else{setSyncStatus('⚠️ 共享数据读取失败，请检查网络',5000);return false}
}
async function saveAndSync(data,deletedPaths,changedPaths){
  setSyncStatus('正在同步…');
  var remote=await fetchRemote();
  var merged=remote?mergeForUpload(remote,data,changedPaths):data;
  (deletedPaths||[]).forEach(function(path){removePath(merged,path)});
  saveLocal(merged);
  var ok=await pushRemote(merged,deletedPaths,changedPaths);
  if(ok){
    setSyncStatus('已同步 ✓');
    localStorage.removeItem('wuren_need_sync');
    localStorage.removeItem('wuren_pending_deletes');
    localStorage.removeItem('wuren_pending_writes');
  }else{
    setSyncStatus('⚠️ 已存本地，联网后同步');
    localStorage.setItem('wuren_need_sync','1');
    if(deletedPaths&&deletedPaths.length)localStorage.setItem('wuren_pending_deletes',JSON.stringify(deletedPaths));
    if(changedPaths&&changedPaths.length)localStorage.setItem('wuren_pending_writes',JSON.stringify(changedPaths));
  }
  setSyncStatus(document.getElementById('syncBar')?document.getElementById('syncBar').textContent:'',5000);
  return ok;
}

function renderPredict(){
  var data=getLocal();var today=new Date();var m=gm(today);var sun=gs(m);
  var nm=new Date(sun);nm.setDate(nm.getDate()+1);var ns=gs(nm);var isS=isSunday(today);var user=cu();
  document.getElementById('predInfo').innerHTML=isS?'预测下周（'+fwr(nm,ns)+'）团队总分<br><span style="font-size:12px">最准的人获下周日打卡权。预测保密，揭晓后才公开</span>':'周日开放预测<br><span style="font-size:12px">预测保密：每人仅见自己的预测，揭晓后全员公开</span>';
  var pk=fd(sun);var pred=data.predictions[pk];var revealed=pred&&pred.revealed;
  var userSubmitted=!!(user&&pred&&pred.preds&&pred.preds[user]!==undefined);
  var inputs='';
  if(revealed){
    PERSONS.forEach(function(p){var v=(pred&&pred.preds&&pred.preds[p]!==undefined)?pred.preds[p]:'-';var isWinner=pred&&pred.winners&&pred.winners.indexOf(p)>-1;inputs+='<div class="pred-input-row"><span class="name">'+p+(isWinner?' 🏆':'')+'</span><span style="font-weight:600">'+v+'分</span></div>'});
    if(pred.actual!==null){inputs+='<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--thread);font-size:13px;color:var(--sage)">实际总分：<strong>'+pred.actual.toFixed(1)+'分</strong> | 中奖：<strong>'+(pred.winners||[]).join('、')+'</strong></div>'}
  }else if(isS&&user){
    PERSONS.forEach(function(p){var submitted=!!(pred&&pred.preds&&pred.preds[p]!==undefined);if(p===user&&!submitted){inputs+='<div class="pred-input-row"><span class="name">'+p+' 👈</span><input type="number" id="pred-'+p+'" placeholder="猜总分" step="0.5" min="0" max="100"></div>'}else{inputs+='<div class="pred-input-row"><span class="name">'+p+(p===user?' 👈':'')+'</span><span style="color:'+(submitted?'var(--sage)':'var(--faded)')+';font-size:13px;font-weight:'+(submitted?'600':'400')+'">'+(submitted?'已猜分 🔒':'未猜分')+'</span></div>'}});
  }else if(isS&&!user){inputs='<div style="text-align:center;color:var(--sepia);padding:10px">请先选择自己再预测</div>'}
  document.getElementById('predInputs').innerHTML=inputs;document.getElementById('predInputs').style.display=isS?'block':'none';
  var saveBtn=document.querySelector('#page-predict .btn-primary');saveBtn.style.display=(isS&&user&&!userSubmitted)?'block':'none';
  if(isS&&user&&!userSubmitted){saveBtn.disabled=false;saveBtn.textContent='📝 提交我的猜分'}
  var ls=new Date(sun);ls.setDate(ls.getDate()-7);var lk=fd(ls);var lp=data.predictions[lk];
  var canReveal=isS&&lp&&!lp.revealed&&lp.preds&&Object.keys(lp.preds).length>0;

  else if(isS){ra.innerHTML='<div style="text-align:center;color:var(--faded);font-size:12px;padding:10px">'+(lp&&lp.revealed?'上周预测已揭晓 ✅':'暂无需要揭晓的预测')+'</div>'}
  else{ra.innerHTML=''}
  var hist='';Object.keys(data.predictions).sort().reverse().forEach(function(k){var pd=data.predictions[k];if(!pd||!pd.revealed)return;hist+='<div style="margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f5f0e8"><div style="font-weight:700">'+k+' 揭晓</div><div style="font-size:12px;color:var(--sub)">预测周：'+pd.weekStart+' 起</div>';if(pd.preds)Object.keys(pd.preds).forEach(function(p){hist+=p+':'+pd.preds[p]+'分 '});hist+='<div style="color:#27ae60">实际：'+pd.actual.toFixed(1)+'分 | 中奖：'+(pd.winners||[]).join('、')+'</div></div>'});
  document.getElementById('predHistory').innerHTML=hist||'<div style="text-align:center;color:var(--sub);padding:20px">还没有已揭晓的预测<br><span style="font-size:12px">周日来猜下周总分！预测保密揭晓日才公开</span></div>';

async function savePredictions(){
  var today=new Date();if(!isSunday(today)){toast('只有周日才能提交预测');return}
  var user=cu();if(!user){toast('请先选择自己');return}
  var m=gm(today);var sun=gs(m);var nm=new Date(sun);nm.setDate(nm.getDate()+1);var ns=gs(nm);var pk=fd(sun);
  var inp=document.getElementById('pred-'+user);if(!inp||inp.value===''){toast('请输入你的预测分数');return}
  var score=parseFloat(inp.value);if(!Number.isFinite(score)||score<0||score>100||score*2%1!==0){toast('请输入 0–100 之间、以 0.5 为单位的分数');return}
  var btn=document.querySelector('#page-predict .btn-primary');btn.disabled=true;btn.textContent='正在提交…';
  var remote=await fetchRemote();
  if(!remote){btn.disabled=false;btn.textContent='📝 重新提交';toast('提交失败：网络连接异常，请稍后重试');return}
  var data=deepMerge(remote,getLocal());
  if(data.predictions[pk]&&data.predictions[pk].preds&&data.predictions[pk].preds[user]!==undefined){saveLocal(data);toast('你本周已经猜过分了，每人只有一次机会');renderPredict();return}
  if(!data.predictions[pk])data.predictions[pk]={weekStart:fd(nm),weekEnd:fd(ns),preds:{},actual:null,winners:[],revealed:false};
  data.predictions[pk].preds[user]=score;
  var ok=await saveAndSync(data);
  if(ok){toast('猜分提交成功！每人只有一次机会 🔒');await syncNow(true);renderPredict()}
  else{delete data.predictions[pk].preds[user];saveLocal(data);btn.disabled=false;btn.textContent='📝 重新提交';toast('提交失败，系统尚未收到，请检查网络后重试')}
}
async function revealPrediction(){
  var today=new Date();if(!isSunday(today)){toast('只有周日才能揭晓预测');return}
  var m=gm(today);var sun=gs(m);
  var ls=new Date(sun);ls.setDate(ls.getDate()-7);var lk=fd(ls);
  var remote=await fetchRemote();if(!remote){toast('网络连接异常，暂时不能揭晓');return}var data=remote;var lp=data.predictions[lk];
  if(!lp){toast('没有找到上周的预测');return}
  if(lp.revealed){toast('上周预测已经揭晓过了');return}
  if(!lp.preds||Object.keys(lp.preds).length===0){toast('上周没有人提交预测');return}
  if(!confirm('确定揭晓上周预测结果吗？揭晓后所有人的预测将公开。'))return;
  var lm=new Date(sun);lm.setDate(lm.getDate()-6);var act=getWeekAllTotal(data,lm);
  lp.actual=act;lp.revealed=true;
  if(lp.preds&&Object.keys(lp.preds).length>0){var minDiff=Infinity,winners=[];Object.keys(lp.preds).forEach(function(p){var diff=Math.abs(lp.preds[p]-act);if(diff<minDiff){minDiff=diff;winners=[p]}else if(diff===minDiff){winners.push(p)}});lp.winners=winners}
  await saveAndSync(data,null,[['predictions',lk]]);toast('🎉 揭晓！中奖：'+(lp.winners||[]).join('、'));renderPredict();renderWeekly();
}
function getWeekAllTotal(data,m){var t=0;PERSONS.forEach(function(p){t+=getWeekTotal(data,p,m)});return t}
function getWeekTotal(data,p,m){var t=0;for(var i=0;i<7;i++){var d=new Date(m);d.setDate(d.getDate()+i);var c=gpc(data,p,fd(d));if(c)t+=(c.study||0)+(c.exercise||0)}return t}

async function loadSeasonData(){
  if(_seasonData)return _seasonData;
  try{var resp=await fetch('./seasons.json?t='+Date.now(),{cache:'no-cache'});if(resp.ok)_seasonData=await resp.json()}catch(e){}
  return _seasonData
}
function calculateSeasonFour(data,config){
  var start=config.plannedStart;var people={};PERSONS.forEach(function(p){people[p]=0});var dates={};
  PERSONS.forEach(function(p){Object.keys((data.checkins&&data.checkins[p])||{}).forEach(function(ds){if(ds<start)return;var c=data.checkins[p][ds];var score=(c.study||0)+(c.exercise||0);people[p]+=score;if(score>0)dates[ds]=(dates[ds]||0)+score})});
  var ordered=Object.keys(dates).sort();var weekly={};ordered.forEach(function(ds){var monday=fd(gm(new Date(ds+'T00:00:00')));weekly[monday]=(weekly[monday]||0)+dates[ds]});
  var weekKeys=Object.keys(weekly).sort();var total=Object.values(people).reduce(function(a,b){return a+b},0);
  return{id:4,name:'第四季',status:total>=config.target?'completed':(ordered.length?'active':'resting'),total:total,weeks:weekKeys.length,people:people,weekly:weekKeys.map(function(k){return weekly[k]}),note:ordered.length?('从 '+ordered[0]+' 开始，数据由每日打卡自动汇总。'):config.note,startDate:ordered[0]||null,target:config.target}
}
function seasonSparkline(values){
  if(!values||!values.length)return'';var width=300,height=64,pad=5,max=Math.max.apply(null,values.concat([1]));var points=values.map(function(v,i){var x=pad+(values.length===1?0:i*(width-pad*2)/(values.length-1));var y=height-pad-v/max*(height-pad*2);return{x:x,y:y}});var path=points.map(function(p,i){return(i?'L':'M')+p.x.toFixed(1)+' '+p.y.toFixed(1)}).join(' ');
  return'<svg class="season-chart" viewBox="0 0 '+width+' '+height+'" preserveAspectRatio="none"><line class="grid" x1="0" y1="'+(height-pad)+'" x2="'+width+'" y2="'+(height-pad)+'"></line><path class="line" d="'+path+'"></path>'+points.map(function(p){return'<circle class="dot" cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="2.4"></circle>'}).join('')+'</svg>'
}
function renderSeasonCard(season,target){
  var pct=Math.min(100,Math.max(0,season.total/target*100));var status=season.status==='completed'?'已完成':season.status==='active'?'进行中':'休息期';
  var segments=(season.segments||[]).length?'<div class="season-segments">'+season.segments.map(function(s){return'<div class="season-segment"><strong>'+s.name+' · '+s.weeks+'周</strong>'+s.months+' · '+s.total+'分</div>'}).join('')+'</div>':'';
  var people='<div class="season-people">'+PERSONS.map(function(p){return'<div class="season-person"><strong>'+Number((season.people&&season.people[p])||0).toFixed(1)+'</strong>'+p.slice(0,1)+'</div>'}).join('')+'</div>';
  return'<article class="season-card"><div class="season-head"><div><div class="season-title">'+season.name+'</div><div class="season-meta">'+status+' · '+season.weeks+' 个计分周</div></div><div class="season-total">'+Number(season.total).toFixed(1)+'<small>/ '+target+' 分</small></div></div><div class="season-progress"><span style="width:'+pct.toFixed(1)+'%"></span></div><div class="season-progress-note"><span>0</span><span>'+pct.toFixed(1)+'%</span><span>'+target+'</span></div>'+segments+people+seasonSparkline(season.weekly)+'<div class="season-note">'+esc(season.note||'')+'</div></article>'

function renderSeasonArchive(data){

function repairApp(){
  toast('正在清理缓存…');
  if('serviceWorker'in navigator){
    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(r){r.unregister();});
    });
  }
  if('caches'in window){
