<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="五仁打卡">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<meta name="theme-color" content="#fef9f3">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="./manifest.json">
<title>五仁打卡</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #fef9f3; --card: #ffffff; --text: #3d3427; --sub: #9b8e7c;
  --accent: #f0883e; --accent2: #55a392; --border: #efe8db;
  --shadow: 0 2px 16px rgba(80,50,20,0.05);
  --radius: 16px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(180deg, #fef9f3 0%, #fdf5ea 50%, #faf3e6 100%);
  color: var(--text); min-height: 100vh; padding-bottom: 80px;
  -webkit-tap-highlight-color: transparent;
}
header {
  background: linear-gradient(135deg, #fffbf5, #fff8ef);
  padding: 18px 20px 14px; text-align: center;
  box-shadow: 0 1px 20px rgba(60,40,20,0.04); position: sticky; top: 0; z-index: 10;
  border-bottom: 1px solid #f0e8d8;
}
header h1 { font-size: 22px; font-weight: 800; letter-spacing: 1px; }
header .date { font-size: 12px; color: var(--sub); margin-top: 3px; }
.user-bar { margin-top: 10px; display: flex; gap: 6px; align-items: center; justify-content: center; flex-wrap: wrap; }
.user-bar select, .user-bar input {
  padding: 7px 12px; border-radius: 10px; border: 1.5px solid var(--border);
  font-size: 14px; font-family: inherit; background: #fffdf9;
}
nav.tabs {
  display: flex; position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
  border-top: 1px solid var(--border); z-index: 10;
  padding: 4px 0 6px; padding-bottom: calc(6px + env(safe-area-inset-bottom, 0));
}
nav.tabs button {
  flex: 1; padding: 8px 4px 6px; border: none; background: none;
  font-size: 11px; color: var(--sub); cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  transition: color 0.2s;
}
nav.tabs button .ico { font-size: 22px; line-height: 1; }
nav.tabs button.active { color: var(--accent); font-weight: 700; }
.page { display: none; padding: 14px; }
.page.active { display: block; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes bounce { 0%,100%{transform:translateX(-50%) translateY(0);} 50%{transform:translateX(-50%) translateY(-8px);} }
.card {
  background: var(--card); border-radius: var(--radius); padding: 16px;
  margin-bottom: 12px; box-shadow: var(--shadow); border: 1px solid var(--border);
}
.card.self {
  border: 2px solid var(--accent);
  background: linear-gradient(135deg, #fffdf7, #fff9f0);
  box-shadow: 0 4px 20px rgba(240,136,62,0.1);
}
.card h3 { font-size: 16px; margin-bottom: 10px; }
.person-name { font-size: 16px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.person-avatar { width: 32px; height: 32px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 16px; }
.score-row { display: flex; gap: 10px; margin-bottom: 8px; }
.score-block { flex: 1; }
.score-block .label { font-size: 12px; color: var(--sub); margin-bottom: 5px; font-weight: 600; }
.score-block .label .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.score-block .label .dot.s { background: var(--accent2); }
.score-block .label .dot.e { background: var(--accent); }
.score-btns { display: flex; gap: 4px; }
.score-btns button {
  flex: 1; min-width: 36px; padding: 10px 3px; border: 2px solid #e8e1d4;
  border-radius: 10px; background: #fdfbf6; font-size: 14px; font-weight: 700;
  color: var(--text); cursor: pointer; transition: all 0.18s;
}
.score-btns button:hover { background: #fff5ea; border-color: #f0c898; }
.score-btns button.sel {
  border-color: var(--accent); background: #fff3e8; color: var(--accent);
  box-shadow: 0 2px 8px rgba(240,136,62,0.15); transform: scale(1.03);
}
.note-input {
  width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 10px;
  font-size: 13px; margin-top: 6px; font-family: inherit; resize: none; height: 38px;
  background: #fdfbf7; transition: border-color 0.2s;
}
.note-input:focus { border-color: var(--accent); outline: none; background: #fff; }
.done-badge {
  display: inline-block; background: #e6f5ef; color: #388e6b;
  font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 600;
}
.not-done { font-size: 13px; color: #c5bfb2; font-style: italic; }
.sunday-lock { text-align: center; color: #d3545a; font-size: 13px; padding: 12px; background: #fef7f7; border-radius: 12px; margin: 10px 0; line-height: 1.6; }
.sunday-winner { text-align: center; color: #27ae60; font-size: 13px; padding: 12px; background: #f2faf6; border-radius: 12px; margin: 10px 0; line-height: 1.6; }
.week-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.week-table th, .week-table td { padding: 6px 3px; text-align: center; border-bottom: 1px solid #f5f0e8; }
.week-table th { font-weight: 700; font-size: 11px; color: var(--sub); }
.week-table td:first-child { text-align: left; font-weight: 600; }
.week-table .sun-col { color: #c0392b; background: #fef9f9; }
.week-table .highlight { background: #fffdf4; font-weight: 700; box-shadow: inset 0 0 0 1px var(--accent); border-radius: 4px; }
.btn {
  display: inline-block; padding: 10px 20px; border-radius: 12px; border: none;
  font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
  transition: all 0.2s; letter-spacing: 0.5px;
}
.btn-primary { background: linear-gradient(135deg, #f0883e, #e67a30); color: #fff; box-shadow: 0 3px 12px rgba(240,136,62,0.25); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(240,136,62,0.35); }
.btn-primary:active { transform: scale(0.97); }
.btn-saved { background: linear-gradient(135deg, #55a392, #489b85) !important; color: #fff !important; box-shadow: 0 3px 12px rgba(85,163,146,0.25) !important; pointer-events: none; }
.btn-outline { background: #fff; border: 2px solid var(--accent); color: var(--accent); }
.btn-outline:hover { background: #fff8f2; }
.btn-small { padding: 6px 14px; font-size: 12px; border-radius: 9px; }
.btn-block { display: block; width: 100%; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.encourage-box {
  background: linear-gradient(135deg, #fffbf5, #fff6ea);
  border-left: 4px solid var(--accent);
  padding: 16px 18px; border-radius: 0 14px 14px 0; margin: 12px 0; font-size: 14px;
  line-height: 1.8; box-shadow: 0 2px 8px rgba(240,136,62,0.06);
}
.encourage-box .greeting { font-size: 17px; font-weight: 800; margin-bottom: 6px; }
.encourage-box .body { color: #5c4d38; }
.encourage-box .humor { color: #9b8e7c; font-style: italic; margin-top: 6px; }
.summary-card { margin-top: 10px; }
.summary-card .person-line { padding: 6px 0; border-bottom: 1px solid #f8f5f0; font-size: 14px; }
.summary-card .total-line { font-weight: 800; font-size: 16px; padding: 10px 0; color: var(--accent); }
.pred-input-row { display: flex; align-items: center; gap: 10px; margin: 6px 0; }
.pred-input-row input {
  width: 70px; padding: 9px; border: 2px solid var(--border);
  border-radius: 10px; font-size: 15px; text-align: center; font-family: inherit;
  font-weight: 600;
}
.pred-input-row .name { flex: 1; font-size: 14px; font-weight: 600; }
.winner-tag { color: #e74c3c; font-weight: 700; font-size: 12px; margin-left: 4px; }
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: #3d3427; color: #fff; padding: 12px 24px; border-radius: 24px;
  font-size: 14px; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.toast.show { opacity: 1; }
.sync-bar { font-size: 11px; color: var(--sub); text-align: center; margin-top: 5px; min-height: 16px; }
.streak-fire { color: #f0883e; font-size: 13px; font-weight: 700; margin-top: 4px; }
@media (min-width: 600px) {
  .checkin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .checkin-grid .card { margin-bottom: 0; }
}
</style>
</head>
<body>

<header>
  <h1>🥜 五仁打卡</h1>
  <div class="date" id="headerDate"></div>
  <div class="user-bar">
    <span style="font-size:13px;font-weight:600;">👤 我是</span>
    <select id="currentUser" onchange="onUserSwitch()">
      <option value="">选择自己</option>
    </select>
    <button class="btn btn-outline btn-small" onclick="syncNow()">🔄 同步</button>
  </div>
  <div class="sync-bar" id="syncBar"></div>
</header>

<div class="toast" id="toast"></div>

<!-- Page 1: 打卡 -->
<div class="page active" id="page-checkin">
  <div class="encourage-box" id="dailyEncourage"></div>
  <div id="sundayNotice"></div>
  <div style="text-align:center;margin-bottom:10px;font-size:13px;color:var(--sub);">
    📅 <input type="date" id="checkinDate" onchange="renderCheckin()" style="padding:6px 10px;border-radius:8px;border:1.5px solid var(--border);font-family:inherit;font-size:13px;background:#fffdf9;">
    <span id="dateBadge" style="font-size:11px;color:#c0392b;font-weight:600;margin-left:6px;"></span>
  </div>
  <div id="checkinArea"></div>
</div>

<!-- Page 2: 周报 -->
<div class="page" id="page-weekly">
  <div class="card">
    <h3>📊 本周战报</h3>
    <div id="weekRange" style="font-size:13px;color:var(--sub);margin-bottom:10px;"></div>
    <div style="overflow-x:auto;" id="weekTable"></div>
    <div class="summary-card" id="weekSummary"></div>
  </div>
  <div class="card">
    <h3>🔮 上周预测揭晓</h3>
    <div id="lastPredResult" style="font-size:14px;line-height:1.8;"></div>
  </div>
</div>

<!-- Page 3: 预测 -->
<div class="page" id="page-predict">
  <div class="card">
    <h3>🔮 预测下周总分</h3>
    <div id="predInfo" style="font-size:13px;color:var(--sub);margin-bottom:12px;line-height:1.6;"></div>
    <div id="predInputs"></div>
    <button class="btn btn-primary btn-block" onclick="savePredictions()" style="margin-top:12px;">📝 提交预测</button>
  </div>
  <div class="card">
    <h3>📜 预测历史</h3>
    <div id="predHistory"></div>
  </div>
</div>

<!-- Page 4: 记录 & 导出 -->
<div class="page" id="page-history">
  <div class="card">
    <h3>📋 导出个人记录</h3>
    <div id="exportList"></div>
  </div>
  <div class="card">
    <h3>📈 近期记录</h3>
    <div id="historyOverview"></div>
  </div>
</div>

<nav class="tabs">
  <button class="active" onclick="switchTab(0)"><span class="ico">📝</span>打卡</button>
  <button onclick="switchTab(1)"><span class="ico">📊</span>周报</button>
  <button onclick="switchTab(2)"><span class="ico">🔮</span>预测</button>
  <button onclick="switchTab(3)"><span class="ico">📋</span>记录</button>
</nav>

<script>
// ============ CONFIG ============
const APP_VERSION = 5; // 改代码后+1，所有人自动提示刷新
const PERSONS = ['石维婧','梅妍洁','单兰迪','王珂','师旌议'];
const DAYS = ['一','二','三','四','五','六','日'];
const AVATARS = { '石维婧':'🌸','梅妍洁':'🥜','单兰迪':'🌟','王珂':'🍃','师旌议':'🔥' };
const TK1='ghp_Ry5Qgv1WAuuUTXdU5BNjFYy',TK2='IeJyvbj1HGOvE';
const GITHUB_TOKEN=TK1+TK2, REPO='meiyanjie1990/wuren-checkin';
const API_URL=`https://api.github.com/repos/${REPO}/contents/data.json`;
// ============ AI CONFIG ============
const DS_KEY = "sk-b536a934fbea40c58afd" + "92739665db75";
const DS_URL = "https://api.deepseek.com/v1/chat/completions";
let _aiEnabled = true; // auto-disabled if API fails

async function callDeepSeek(personName, studyScore, studyNote, exerciseScore, exerciseNote, streak, weekDone, dayOfWeek, timeGreeting) {
  if (!_aiEnabled) return null;
  const parts = [];
  if (studyScore > 0) parts.push("学习" + studyScore + "分" + (studyNote ? "，内容：" + studyNote : ""));
  if (exerciseScore > 0) parts.push("运动" + exerciseScore + "分" + (exerciseNote ? "，内容：" + exerciseNote : ""));
  if (parts.length === 0) return null;

  const context = parts.join("；");
  const prompt = `你是一个打卡App里的鼓励助手，给30-40岁的自律成年人写一句温暖的、有活人感的打卡反馈。用口语化的中文，像朋友之间的鼓励。要轻松自然，不要喊口号，不要用感叹号堆砌。偶尔可以有一点点冷幽默。40-60字，像个话痨但温暖的朋友。

时间：${timeGreeting}
用户：${personName}
${context}
连续打卡：${streak}天
本周已打卡：${weekDone}天

根据ta写的内容给定制反馈，回应ta具体做了什么。直接给回复内容，不需要前缀。`;

  try {
    const resp = await fetch(DS_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + DS_KEY },
      body: JSON.stringify({
        model: "deepseek-chat",
        messages: [{ role: "user", content: prompt }],
        max_tokens: 150,
        temperature: 0.9
      }),
      signal: (()=>{const c=new AbortController();setTimeout(()=>c.abort(),5000);return c.signal;})()
    });
    if (!resp.ok) { _aiEnabled = false; return null; }
    const data = await resp.json();
    const reply = data.choices?.[0]?.message?.content?.trim();
    if (!reply || reply.length < 2) return null;
    return reply;
  } catch(e) {
    return null;
  }
}


// ============ HELPERS ============
function getMonday(d){d=new Date(d);d.setHours(0,0,0,0);const day=d.getDay();d.setDate(d.getDate()+(day===0?-6:1-day));return d;}
function getSunday(m){const s=new Date(m);s.setDate(s.getDate()+6);return s;}
function fmtDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fmtDateShort(d){return `${d.getMonth()+1}/${d.getDate()}`;}
function fmtWeekRange(m,s){return `${m.getMonth()+1}月${m.getDate()}日 - ${s.getMonth()+1}月${s.getDate()}日`;}
function isSunday(d){return d.getDay()===0;}
function isSameDay(a,b){return fmtDate(a)===fmtDate(b);}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function getCurrentUser(){return document.getElementById('currentUser').value;}
function getCheckinDate(){const v=document.getElementById('checkinDate').value;return v||fmtDate(new Date());}

// ============ DATA ============
let _dataSha=null,_localData=null;
function loadLocal(){try{const d=localStorage.getItem('wuren_data');return d?JSON.parse(d):{};}catch(e){return{};}}
function saveLocal(data){_localData=data;localStorage.setItem('wuren_data',JSON.stringify(data));}
function getLocal(){if(_localData)return _localData;let d=loadLocal();if(!d.checkins)d.checkins={};if(!d.predictions)d.predictions={};_localData=d;return d;}
function getPersonCheckin(data,person,dateStr){if(!data.checkins[person])return null;return data.checkins[person][dateStr]||null;}

// ============ SYNC ============
async function fetchRemoteData(){
  try{
    const resp=await fetch(API_URL,{headers:{'Authorization':'token '+GITHUB_TOKEN,'Accept':'application/vnd.github.v3+json'},cache:'no-cache'});
    if(!resp.ok)return null;
    const json=await resp.json();_dataSha=json.sha;
    const raw=atob(json.content.replace(/\s/g,''));
    return JSON.parse(decodeURIComponent(escape(raw)));
  }catch(e){console.log('Fetch err:',e.message);return null;}
}
async function pushRemote(data){
  const jsonStr=JSON.stringify(data,null,2);
  const content=btoa(unescape(encodeURIComponent(jsonStr)));
  const body={message:'📝 打卡更新',content,branch:'main'};
  if(_dataSha)body.sha=_dataSha;
  try{
    const resp=await fetch(API_URL,{method:'PUT',headers:{'Authorization':'token '+GITHUB_TOKEN,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!resp.ok){const err=await resp.json();if(err.message&&err.message.includes('sha')){const refetch=await fetch(API_URL,{headers:{'Authorization':'token '+GITHUB_TOKEN,'Accept':'application/vnd.github.v3+json'}});if(refetch.ok){const rd=await refetch.json();body.sha=rd.sha;const retry=await fetch(API_URL,{method:'PUT',headers:{'Authorization':'token '+GITHUB_TOKEN,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});if(retry.ok){_dataSha=(await retry.json()).content.sha;return true;}}}return false;}
    const result=await resp.json();_dataSha=result.content.sha;return true;
  }catch(e){console.log('Push err:',e.message);return false;}
}
async function syncNow(silent){
  const bar=document.getElementById('syncBar');if(bar)bar.textContent='⏳ 同步中…';
  const remote=await fetchRemoteData();
  if(remote){saveLocal(remote);if(bar)bar.textContent='☁️ 已同步';if(!silent){renderAll();toast('✅ 数据已同步');}setTimeout(()=>{if(bar)bar.textContent='';},3000);return true;}
  else{if(bar)bar.textContent='⚠️ 离线模式';if(!silent)toast('⚠️ 无法连接云端，使用本地数据');setTimeout(()=>{if(bar)bar.textContent='';},4000);return false;}
}
async function saveAndSync(data){saveLocal(data);const ok=await pushRemote(data);const bar=document.getElementById('syncBar');if(ok){if(bar)bar.textContent='☁️ 已同步';setTimeout(()=>{if(bar)bar.textContent='';},3000);}else{if(bar)bar.textContent='⚠️ 已存本地，联网后自动同步';setTimeout(()=>{if(bar)bar.textContent='';},5000);}return ok;}
function onUserSwitch(){const user=getCurrentUser();if(user){localStorage.setItem('wuren_me',user);toast(`👤 ${user}，你好！`);}renderCheckin();}

// ============ ENCOURAGEMENT MASTER ============
function countStreak(data, person) {
  let streak=0; const d=new Date(); d.setDate(d.getDate()-1);
  while(d.getFullYear()>=2026){
    const c=getPersonCheckin(data,person,fmtDate(d));
    if(!c||((c.study||0)+(c.exercise||0))===0)break;
    streak++; d.setDate(d.getDate()-1);
  }
  return streak;
}
function countWeeklyDone(data, person) {
  const today=new Date(); const monday=getMonday(today);
  let days=0;
  for(let i=0;i<6;i++){const d=new Date(monday);d.setDate(d.getDate()+i);const c=getPersonCheckin(data,person,fmtDate(d));if(c&&((c.study||0)+(c.exercise||0))>0)days++;}
  return days;
}

function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return Math.abs(h);}

function noteReaction(note, type) {
  if(!note||note.trim()==='')return null;
  const n=note.toLowerCase();
  const reactions={
    study:[
      {kw:'英语 单词 语法 阅读 听力 口语 作文 翻译 english toefl ielts'.split(' '),r:['英语是个慢功夫，今天这步走得很稳 ✍️','语言这东西，每天碰一点比周末猛攻有效得多 🗣️','学语言的快乐：有一天突然发现能听懂了，那种感觉很妙']},
      {kw:'数学 做题 公式 代数 几何 高数'.split(' '),r:['动脑子的快乐，只有动脑子的人懂 🔢','保持大脑运转，是最好的抗衰老秘方']},
      {kw:'书 看书 读 页 章 小说 文学 历史 哲学 传记 散文'.split(' '),r:['阅读是最低成本的旅行，今天你又出发了 📖','一本书、半小时，比刷手机充实太多——虽然刷手机确实更轻松 😄']},

  // Remove common words and punctuation, grab first 2-4 chars as a hook
  const cleaned=note.replace(/[，,。.!！？?、\s~～—\-…]+/g,' ').replace(/(今天|了|的|也|很|都|是|在|和|与|吧|呢|啊|哦|哈|嗯)/g,'').trim();

  if(!hook||hook.length<2)return null;

  const fallbacks={
    study:[

      `"${hook}"——有意思。学什么都不白学，总有一天会连起来 ✨`,

      `没有标准答案的运动方式，"${hook}"就是你的答案 🙂`,
    ]
  };
  const pool=fallbacks[type]||fallbacks.study;
  return pool[hashStr(note+type+'fallback')%pool.length];
}



function generateEncourageMini(data, dateStr, person) {
  const existing = getPersonCheckin(data, person, dateStr);
  if (!existing) return '';
  const total = (existing.study||0) + (existing.exercise||0);
  if (total === 0) return '';
  const avatar = AVATARS[person] || '👤';
  // Check AI cache first
  const aiCache = JSON.parse(localStorage.getItem('wuren_ai_cache')||'{}');
  const aiEntry = aiCache[person+'|'+dateStr];
  if (aiEntry && aiEntry.reply && aiEntry.time && (Date.now() - aiEntry.time < 86400000)) {
    const shortAI = aiEntry.reply.length>40 ? aiEntry.reply.slice(0,40)+'...' : aiEntry.reply;
    return '<div style="display:flex;align-items:flex-start;gap:6px;margin-bottom:6px;padding:4px 0;border-bottom:1px solid #f5f5f5;"><span style="font-size:16px;">'+avatar+'</span><span><strong>'+person+'</strong> '+total.toFixed(1)+'分'+'<br><span style="color:#5c4d38;">'+shortAI+'</span></span></div>';
  }
  // Fallback to keyword
  const sReaction = (existing.study||0)>0 ? noteReaction(existing.sNote||'','study') : null;
  const eReaction = (existing.exercise||0)>0 ? noteReaction(existing.eNote||'','exercise') : null;
  const reaction = sReaction || eReaction || '';
  const shortReaction = reaction ? (reaction.includes('。')?reaction.split('。')[0]:reaction.includes('！')?reaction.split('！')[0]:reaction.slice(0,30)) : '';
  if (!shortReaction && !total) return '';
  return '<div style="display:flex;align-items:flex-start;gap:6px;margin-bottom:4px;"><span style="font-size:16px;">'+avatar+'</span><span><strong>'+person+'</strong> '+total.toFixed(1)+'分'+'<br>'+(shortReaction||'今天也打卡了')+'</span></div>';
}

      if(doneList.length>=4) parts.push('今天五仁全员到齐！这是最好的状态——互相看见，互相托着。');
      else if(doneList.length>=2) parts.push(doneList.join('、')+' 今天也打卡了，你们在互相照亮 🌟');
      else if(doneList.length===1) parts.push(doneList[0]+' 今天也打卡了——你俩是今天的行动派双人组。');
      else parts.push('你是今天第一个打卡的！门开了，等其他人跟上~ 🚪');
    }

    if(!humor){
      const humors=[
        '生活小知识：每打卡一次，身上的"优秀"标签就会亮一下 💡',
        '三十岁以后的坚持，不是为了给别人看，是给自己的交代。',
        '问：都这岁数了还学什么？答：正因为这岁数了，才更要学给自己看。',

        st>et?'今天学习的分数比运动多，大脑表示很满意，身体表示：明天到我了 💤':'今天运动拉满！肌肉在生长，大脑在喘气，都很忙 💪',

        '打卡就像种树——每天浇一点水，一年后回头看，嚯，一片森林。'
      ];
      humor=humors[seed%humors.length];
    }
    return '<div class="greeting">'+greeting+'，'+currentUser+'！</div><div class="body">'+parts.join('<br>')+'</div><div class="humor">'+humor+'</div>';
  }

  // ===== NOT YET CHECKED IN =====
  let tips=[], humor='';
  const seed2=hashStr(currentUser+dateStr+'pre');

  if(dayOfWeek===1){
    const monTips=[['周一是最需要勇气的一天——你敢开始，这周就赢了一半。','给自己一个小目标，不用多，哪怕0.5分，也是破冰。'],['新的一周，blank canvas。你打算在上面画点什么？','研究表明（某个不太严谨的研究），周一打卡的人一周都更顺利。']];
    tips=monTips[seed2%2];
    humor='周一：一周中最被误解的一天。其实它挺好的，只是需要你给它一个机会 😅';
  } else if(dayOfWeek===5||dayOfWeek===6){
    tips=['周末的诱惑很大（床、手机、外卖），但你打开这个页面本身就已经赢了第一步。','周五六的每一分都有双倍的含金量——因为这时候坚持最难。'];
    humor='周五：身体在工位，灵魂已经在周末。但你还记得打开打卡页面——这就是纪律 👏';
  } else {
    const pool=[
      ['打卡不是考试，不需要每次都满分。<strong>来了就是胜利。</strong>','选0.5分还是2分不重要，重要的是你在做。'],
      ['很多人高估一天能做的事，低估了一百天能积累的事。','你现在的每0.5分，都是未来的筹码。'],
      ['今天累了？那就学半小时、动半小时。<strong>轻量完成也是完成。</strong>','坚持不是每天都全力以赴，是每天都不缺席。'],
      ['打开这个页面就已经超过了昨天的你——如果昨天没打开的话 😄','开始是最难的部分，你已经完成了最难的部分。'],
      ['五仁的约定是：可以慢，但不可以停。','你今天花五分钟打个卡，比躺着一动不动强一百倍。']
    ];
    tips=pool[seed2%pool.length];
    humor=['累了一天还要学习？你对自己的要求，决定了你是什么样的人 🧠','拖延症的本质是——你不知道开始之后有多爽。今天试试？','每一滴汗水都是脂肪的眼泪——当然也可能是大脑的眼泪，取决于你学还是动 😂'][seed2%3];
  }

  if(streak>=14) tips.push('💎 <strong>'+streak+'</strong> 天连续打卡！这个数字太珍贵了，今天千万别让它断掉。');
  else if(streak>=7) tips.push('⭐ 你已经连续 <strong>'+streak+'</strong> 天了——今天再加一天，让这个数字继续涨。');

  if(isToday){
    let doneList=[]; PERSONS.forEach(p=>{if(p!==currentUser&&getPersonCheckin(data,p,dateStr))doneList.push(p);});
    if(doneList.length>=3) tips.push(doneList.length+'位伙伴已经打完了，你是下一个吗？🤔');
    else if(doneList.length>0) tips.push(doneList.join('、')+' 今天已经打了，在等你呢~');
  }

  return '<div class="greeting">'+greeting+'，'+currentUser+'！</div><div class="body">'+tips.join('<br><br>')+'</div><div class="humor">'+humor+'</div>';

function scoreBtns(type){const id=type==='study'?'bs':'be';return[0,0.5,1,1.5,2].map(v=>`<button id="${id}-${v}" onclick="selectScore('${type}',${v})">${v===0?'0':v}</button>`).join('');}

  const total = (record.study||0) + (record.exercise||0);

    const aiBtn = document.createElement('div');

    aiBtn.style.cssText = 'text-align:center;margin-top:8px;';

async function savePredictions(){
  const data=getLocal();const today=new Date();if(!isSunday(today)){toast('只有周日才能提交预测哦~');return;}
  const monday=getMonday(today);const sunday=getSunday(monday);const nextMon=new Date(sunday);nextMon.setDate(nextMon.getDate()+1);const predKey=fmtDate(sunday);
  if(!data.predictions[predKey])data.predictions[predKey]={weekStart:fmtDate(nextMon),preds:{},actual:null,winners:[]};
  let count=0;PERSONS.forEach(p=>{const inp=document.getElementById('pred-'+p);if(inp&&inp.value!==''){data.predictions[predKey].preds[p]=parseFloat(inp.value)||0;count++;}});
  const lastSun=new Date(sunday);lastSun.setDate(lastSun.getDate()-7);const lastKey=fmtDate(lastSun);const lastPred=data.predictions[lastKey];
  if(lastPred&&lastPred.actual===null){const thisMon=new Date(sunday);thisMon.setDate(thisMon.getDate()-6);const actual=getWeekAllTotal(data,thisMon);lastPred.actual=actual;if(lastPred.preds&&Object.keys(lastPred.preds).length>0){let minDiff=Infinity,winners=[];Object.keys(lastPred.preds).forEach(p=>{const diff=Math.abs(lastPred.preds[p]-actual);if(diff<minDiff){minDiff=diff;winners=[p];}else if(diff===minDiff){winners.push(p);}});lastPred.winners=winners;}}
  await saveAndSync(data);toast(`✅ 已保存 ${count} 位预测！中奖者已揭晓~`);renderPredict();
}
function getWeekAllTotal(data,monday){let total=0;PERSONS.forEach(p=>{total+=getWeekTotal(data,p,monday);});return total;}
function getWeekTotal(data,person,monday){let total=0;for(let i=0;i<6;i++){const d=new Date(monday);d.setDate(d.getDate()+i);const c=getPersonCheckin(data,person,fmtDate(d));if(c)total+=(c.study||0)+(c.exercise||0);}const sun=getSunday(monday);const sunStr=fmtDate(sun);const winnerKey=fmtDate(new Date(sun.getTime()-14*86400000));const predData=data.predictions[winnerKey];if(predData&&predData.winners&&predData.winners.includes(person)){const c=getPersonCheckin(data,person,sunStr);if(c)total+=(c.study||0)+(c.exercise||0);}return total;}

// ============ HISTORY ============
function renderHistory(){const data=getLocal();let expHtml='';PERSONS.forEach(p=>{expHtml+=`<div style="margin-bottom:8px;"><button class="btn btn-outline btn-small" onclick="exportPerson('${p}')">📥 导出 ${p}</button></div>`;});expHtml+=`<button class="btn btn-outline btn-small" onclick="exportAll()">📥 导出全部汇总</button>`;document.getElementById('exportList').innerHTML=expHtml;const allDates=new Set();PERSONS.forEach(p=>{if(data.checkins[p])Object.keys(data.checkins[p]).forEach(d=>allDates.add(d));});const sorted=[...allDates].sort().reverse().slice(0,30);if(sorted.length===0){document.getElementById('historyOverview').innerHTML='<div style="text-align:center;color:var(--sub);padding:30px;font-size:14px;">📭 还没有打卡记录<br><span style="font-size:12px;">快去打卡吧，第一个记录从这里开始！</span></div>';}else{let tbl='<table class="week-table"><thead><tr><th>日期</th>';PERSONS.forEach(p=>{tbl+=`<th>${p.slice(0,2)}</th>`;});tbl+='<th>日总</th></tr></thead><tbody>';sorted.forEach(dStr=>{tbl+=`<tr><td>${dStr.slice(5)}</td>`;let dt=0;PERSONS.forEach(p=>{const c=getPersonCheckin(data,p,dStr);const sc=c?(c.study||0)+(c.exercise||0):0;dt+=sc;tbl+=`<td>${sc>0?sc.toFixed(1):'-'}</td>`;});tbl+=`<td><strong>${dt.toFixed(1)}</strong></td></tr>`;});tbl+='</tbody></table>';document.getElementById('historyOverview').innerHTML=tbl;}}
function exportPerson(person){const data=getLocal();const records=data.checkins[person]||{};const dates=Object.keys(records).sort();let txt=`📋 ${person} 打卡记录\n${'═'.repeat(40)}\n\n`;let grand=0;dates.forEach(d=>{const r=records[d];const dObj=new Date(d+'T00:00:00');const dayName=DAYS[dObj.getDay()===0?6:dObj.getDay()-1];const sc=(r.study||0)+(r.exercise||0);grand+=sc;txt+=`📅 ${d} 星期${dayName}\n   学习：${r.study||0}分${r.sNote?' — '+r.sNote:''}\n   运动：${r.exercise||0}分${r.eNote?' — '+r.eNote:''}\n   小计：${sc.toFixed(1)}分\n\n`;});txt+=`${'─'.repeat(40)}\n📊 总计：${grand.toFixed(1)}分 | ${dates.length}天\n导出时间：${new Date().toLocaleString()}\n`;downloadFile(`${person}_打卡记录.txt`,txt);}
function exportAll(){const data=getLocal();let txt=`📋 五仁打卡汇总\n${'═'.repeat(50)}\n\n`;PERSONS.forEach(p=>{const records=data.checkins[p]||{};const dates=Object.keys(records).sort();let total=0;dates.forEach(d=>{const r=records[d];total+=(r.study||0)+(r.exercise||0);});txt+=`${p}：${total.toFixed(1)}分 | ${dates.length}天\n`;});txt+=`\n导出时间：${new Date().toLocaleString()}\n`;downloadFile('五仁打卡_汇总.txt',txt);}
function downloadFile(filename, content){
  const blob=new Blob(['﻿'+content],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast(`✅ 已导出：${filename}`);
}

// ============ TABS ============
async function generateMissingAI(data, dateStr) {
  const aiCache = JSON.parse(localStorage.getItem('wuren_ai_cache')||'{}');
  const hour = new Date().getHours();
  const timeGreeting = hour<7?'清晨':hour<10?'上午':hour<13?'中午':hour<17?'下午':hour<20?'傍晚':'晚上';
  
  for (const person of PERSONS) {
    const existing = getPersonCheckin(data, person, dateStr);
    if (!existing || ((existing.study||0)+(existing.exercise||0))===0) continue;
    // Skip if AI reply already cached
    const cacheKey = person+'|'+dateStr;
    if (aiCache[cacheKey] && aiCache[cacheKey].reply) continue;
    
    const streak = countStreak(data, person);
    const weekDone = countWeeklyDone(data, person);
    const day = new Date(dateStr+'T00:00:00').getDay()||7;
    
    // Stagger calls to avoid rate limit (500ms apart)
    const aiReply = await callDeepSeek(person, existing.study||0, existing.sNote||'', existing.exercise||0, existing.eNote||'', streak, weekDone, day, timeGreeting);
    if (aiReply) {
      aiCache[cacheKey] = {reply:aiReply, time:Date.now()};
      localStorage.setItem('wuren_ai_cache', JSON.stringify(aiCache));
      // Update encouragement display
      const encDiv = document.getElementById('dailyEncourage');
      if (encDiv && document.getElementById('page-checkin').classList.contains('active')) {
        const d = getLocal();
        encDiv.innerHTML = generateEncourage(d, dateStr, getCurrentUser());
      }
    }
    // Small delay between calls
    await new Promise(r => setTimeout(r, 500));
  }
}

function switchTab(idx){document.querySelectorAll('.page').forEach((p,i)=>p.classList.toggle('active',i===idx));document.querySelectorAll('nav.tabs button').forEach((b,i)=>b.classList.toggle('active',i===idx));if(idx===0)renderCheckin();if(idx===1)renderWeekly();if(idx===2)renderPredict();if(idx===3)renderHistory();}

// ============ INIT ============
async function checkVersion(){
  try{
    // Use API (more reliable in China than raw.githubusercontent.com)
    const resp=await fetch(`https://api.github.com/repos/${REPO}/contents/version.json?t=${Date.now()}`,{
      headers:{'Authorization':'token '+GITHUB_TOKEN,'Accept':'application/vnd.github.v3+json'},
      cache:'no-cache'
    });
    if(resp.ok){
      const json=await resp.json();
      const remoteVer=JSON.parse(decodeURIComponent(escape(atob(json.content.replace(/\s/g,''))))).version;
      const storedVer=parseInt(localStorage.getItem('wuren_ver')||'0');
      if(remoteVer>storedVer){
        const banner=document.createElement('div');
        banner.id='verBanner';
        banner.style.cssText='position:fixed;top:0;left:50%;transform:translateX(-50%);z-index:300;background:#f0883e;color:#fff;padding:10px 20px;border-radius:0 0 16px 16px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.2);animation:bounce 0.5s ease;';
        banner.textContent='🆕 有新版本！点此刷新 →';
        banner.onclick=()=>{
          localStorage.setItem('wuren_ver',String(remoteVer));
          // Aggressively clear all caches
          if('serviceWorker'in navigator){
            navigator.serviceWorker.getRegistrations().then(regs=>regs.forEach(r=>r.unregister()));
          }
          if('caches'in window){
            caches.keys().then(keys=>keys.forEach(k=>caches.delete(k)));
          }
          banner.textContent='✅ 已更新！';banner.style.background='#55a392';
          setTimeout(()=>location.reload(true),200);
        };
        document.body.appendChild(banner);
        setTimeout(()=>{const b=document.getElementById('verBanner');if(b)b.remove();},20000);
      }
    }
  }catch(e){}
}

async function init(){
  const sel=document.getElementById('currentUser');sel.innerHTML='<option value="">选择自己</option>'+PERSONS.map(p=>`<option value="${p}">${AVATARS[p]||''} ${p}</option>`).join('');
  const saved=localStorage.getItem('wuren_me');if(saved&&PERSONS.includes(saved))sel.value=saved;
  document.getElementById('checkinDate').value=fmtDate(new Date());
  await syncNow(true);renderAll();
  checkVersion(); // Check for updates in background
  if('serviceWorker'in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
}
init();
