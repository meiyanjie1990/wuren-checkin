<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="五仁打卡">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<meta name="theme-color" content="#f5f0e8">
<link rel="manifest" href="./manifest.json">
<title>五仁打卡</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #faf7f2; --card: #ffffff; --text: #3d3929; --sub: #8b856e;
  --accent: #e8913a; --accent2: #5b9e8c; --border: #e8e3d5;
  --shadow: 0 2px 12px rgba(60,50,30,0.06);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px;
  -webkit-tap-highlight-color: transparent;
}
header {
  background: var(--card); padding: 14px 20px; text-align: center;
  box-shadow: var(--shadow); position: sticky; top: 0; z-index: 10;
}
header h1 { font-size: 20px; font-weight: 700; }
header .date { font-size: 12px; color: var(--sub); margin-top: 2px; }
.user-bar {
  margin-top: 8px; display: flex; gap: 6px; align-items: center;
  justify-content: center; flex-wrap: wrap;
}
.user-bar select, .user-bar input {
  padding: 6px 10px; border-radius: 8px; border: 1.5px solid var(--border);
  font-size: 14px; font-family: inherit;
}
nav.tabs {
  display: flex; position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--card); border-top: 1px solid var(--border); z-index: 10;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
nav.tabs button {
  flex: 1; padding: 10px 4px 8px; border: none; background: none;
  font-size: 12px; color: var(--sub); cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
nav.tabs button .ico { font-size: 20px; }
nav.tabs button.active { color: var(--accent); font-weight: 600; }
.page { display: none; padding: 16px; }
.page.active { display: block; }
.card {
  background: var(--card); border-radius: 14px; padding: 14px;
  margin-bottom: 10px; box-shadow: var(--shadow); border: 1px solid var(--border);
}
.card.self { border: 2px solid var(--accent); background: #fffdf7; }
.card h3 { font-size: 16px; margin-bottom: 8px; }
.person-name { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.score-row { display: flex; gap: 8px; margin-bottom: 6px; }
.score-block { flex: 1; }
.score-block .label { font-size: 12px; color: var(--sub); margin-bottom: 4px; }
.score-block .label .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
.score-block .label .dot.s { background: var(--accent2); }
.score-block .label .dot.e { background: var(--accent); }
.score-btns { display: flex; gap: 3px; flex-wrap: wrap; }
.score-btns button {
  flex: 1; min-width: 34px; padding: 7px 3px; border: 1.5px solid var(--border);
  border-radius: 8px; background: var(--card); font-size: 13px; font-weight: 600;
  color: var(--text); cursor: pointer; transition: all 0.15s;
}
.score-btns button.sel { border-color: var(--accent); background: #fef7f0; color: var(--accent); }
.note-input {
  width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; margin-top: 4px; font-family: inherit; resize: none; height: 34px;
}
.done-badge {
  display: inline-block; background: #e8f5e9; color: #388e3c;
  font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: 6px;
}
.sunday-lock { text-align: center; color: #c0392b; font-size: 13px; padding: 10px; background: #fef5f5; border-radius: 10px; margin: 8px 0; }
.sunday-winner { text-align: center; color: #27ae60; font-size: 13px; padding: 10px; background: #f0faf4; border-radius: 10px; margin: 8px 0; }
.week-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.week-table th, .week-table td { padding: 5px 3px; text-align: center; border-bottom: 1px solid var(--border); }
.week-table th { font-weight: 600; font-size: 11px; color: var(--sub); }
.week-table td:first-child { text-align: left; font-weight: 500; }
.week-table .sun-col { color: #c0392b; }
.week-table .highlight { background: #fffbe6; font-weight: 600; }
.btn {
  display: inline-block; padding: 10px 18px; border-radius: 10px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-saved { background: var(--accent2) !important; color: #fff !important; pointer-events: none; }
.btn-outline { background: var(--card); border: 1.5px solid var(--accent); color: var(--accent); }
.btn-small { padding: 5px 12px; font-size: 12px; border-radius: 8px; }
.btn-block { display: block; width: 100%; }
.btn-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.encourage-box {
  background: linear-gradient(135deg, #fef9f0, #fff5e8); border-left: 4px solid var(--accent);
  padding: 12px 14px; border-radius: 0 10px 10px 0; margin: 10px 0; font-size: 13px; line-height: 1.6;
}
.summary-card { margin-top: 8px; }
.summary-card .person-line { padding: 5px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
.summary-card .total-line { font-weight: 700; font-size: 15px; padding: 8px 0; color: var(--accent); }
.pred-input-row { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
.pred-input-row input {
  width: 65px; padding: 7px; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 14px; text-align: center; font-family: inherit;
}
.pred-input-row .name { flex: 1; font-size: 13px; font-weight: 500; }
.winner-tag { color: #e74c3c; font-weight: 600; font-size: 11px; margin-left: 4px; }
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: #3d3929; color: #fff; padding: 10px 20px; border-radius: 20px;
  font-size: 13px; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.toast.show { opacity: 1; }
.sync-bar { font-size: 11px; color: var(--sub); text-align: center; margin-top: 4px; }
@media (min-width: 600px) {
  .checkin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .checkin-grid .card { margin-bottom: 0; }
}
</style>
</head>
<body>

<header>
  <h1>🥜 五仁打卡</h1>
  <div class="date" id="headerDate"></div>
  <div class="user-bar">
    <span style="font-size:13px;">👤 我是</span>
    <select id="currentUser" onchange="onUserSwitch()">
      <option value="">选择自己</option>
    </select>
    <button class="btn btn-outline btn-small" onclick="syncNow()">🔄 同步</button>
  </div>
  <div class="sync-bar" id="syncBar"></div>
</header>

<div class="toast" id="toast"></div>

<!-- Page 1: 打卡 -->
<div class="page active" id="page-checkin">
  <div class="encourage-box" id="dailyEncourage"></div>
  <div id="sundayNotice"></div>
  <div style="text-align:center;margin-bottom:8px;font-size:12px;color:var(--sub);">
    选择日期：<input type="date" id="checkinDate" onchange="renderCheckin()" style="padding:5px 8px;border-radius:6px;border:1px solid var(--border);font-family:inherit;font-size:13px;">
    <span id="dateBadge" style="font-size:11px;color:#c0392b;margin-left:6px;"></span>
  </div>
  <div id="checkinArea"></div>
</div>

<!-- Page 2: 周报 -->
<div class="page" id="page-weekly">
  <div class="card">
    <h3>📊 本周概览</h3>
    <div id="weekRange" style="font-size:13px;color:var(--sub);margin-bottom:8px;"></div>
    <div style="overflow-x:auto;" id="weekTable"></div>
    <div class="summary-card" id="weekSummary"></div>
  </div>
  <div class="card">
    <h3>🔮 上周预测结果</h3>
    <div id="lastPredResult" style="font-size:14px;"></div>
  </div>
</div>

<!-- Page 3: 预测 -->
<div class="page" id="page-predict">
  <div class="card">
    <h3>🔮 预测下周总分</h3>
    <div id="predInfo" style="font-size:13px;color:var(--sub);margin-bottom:10px;"></div>
    <div id="predInputs"></div>
    <button class="btn btn-primary btn-block" onclick="savePredictions()" style="margin-top:10px;">📝 保存预测</button>
  </div>
  <div class="card">
    <h3>📜 预测历史</h3>
    <div id="predHistory"></div>
  </div>
</div>

<!-- Page 4: 记录 & 导出 -->
<div class="page" id="page-history">
  <div class="card">
    <h3>📋 导出个人记录</h3>
    <div id="exportList"></div>
  </div>
  <div class="card">
    <h3>📈 近期记录</h3>
    <div id="historyOverview"></div>
  </div>
</div>

<nav class="tabs">
  <button class="active" onclick="switchTab(0)"><span class="ico">📝</span>打卡</button>
  <button onclick="switchTab(1)"><span class="ico">📊</span>周报</button>
  <button onclick="switchTab(2)"><span class="ico">🔮</span>预测</button>
  <button onclick="switchTab(3)"><span class="ico">📋</span>记录</button>
</nav>

<script>
// ============ CONFIG ============
const PERSONS = ['石维婧','梅妍洁','单兰迪','王珂','师旌议'];
const DAYS = ['一','二','三','四','五','六','日'];
// Token parts (avoid GitHub secret scanning)
const TK1 = 'ghp_Ry5Qgv1WAuuUTXdU5BNjFYy';
const TK2 = 'IeJyvbj1HGOvE';
const GITHUB_TOKEN = TK1 + TK2;
const REPO = 'meiyanjie1990/wuren-checkin';
const API_URL = `https://api.github.com/repos/${REPO}/contents/data.json`;
const RAW_BASE = `https://raw.githubusercontent.com/${REPO}/main`;

// ============ HELPERS ============
function getMonday(d) { d = new Date(d); d.setHours(0,0,0,0); const day = d.getDay(); d.setDate(d.getDate() + (day===0?-6:1-day)); return d; }
function getSunday(m) { const s = new Date(m); s.setDate(s.getDate()+6); return s; }
function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtDateShort(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
function fmtWeekRange(m,s) { return `${m.getMonth()+1}月${m.getDate()}日 - ${s.getMonth()+1}月${s.getDate()}日`; }
function isSunday(d) { return d.getDay()===0; }
function isSameDay(a,b) { return fmtDate(a)===fmtDate(b); }
function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function getCurrentUser() { return document.getElementById('currentUser').value; }
function getCheckinDate() { const v=document.getElementById('checkinDate').value; return v||fmtDate(new Date()); }

// ============ DATA ============
let _dataSha = null;
let _localData = null;

function loadLocal() {
  try { const d=localStorage.getItem('wuren_data'); return d?JSON.parse(d):{}; }
  catch(e) { return {}; }
}
function saveLocal(data) {
  _localData = data;
  localStorage.setItem('wuren_data', JSON.stringify(data));
}
function getLocal() {
  if (_localData) return _localData;
  let d = loadLocal();
  if (!d.checkins) d.checkins = {};
  if (!d.predictions) d.predictions = {};
  _localData = d;
  return d;
}

function getPersonCheckin(data, person, dateStr) {
  if (!data.checkins[person]) return null;
  return data.checkins[person][dateStr] || null;
}

// ============ GITHUB SYNC ============
async function fetchRemoteData() {
  try {
    const resp = await fetch(API_URL, {
      headers: { 'Authorization':'token '+GITHUB_TOKEN, 'Accept':'application/vnd.github.v3+json' },
      cache: 'no-cache'
    });
    if (!resp.ok) return null;
    const json = await resp.json();
    _dataSha = json.sha;
    // Decode base64 content
    const raw = atob(json.content.replace(/\s/g,''));
    return JSON.parse(decodeURIComponent(escape(raw)));
  } catch(e) {
    console.log('Fetch remote error:', e.message);
    return null;
  }
}

async function pushRemote(data) {
  const jsonStr = JSON.stringify(data, null, 2);
  const content = btoa(unescape(encodeURIComponent(jsonStr)));
  const body = { message:'📝 打卡更新', content, branch:'main' };
  if (_dataSha) body.sha = _dataSha;

  try {
    const resp = await fetch(API_URL, {
      method:'PUT',
      headers: {
        'Authorization':'token '+GITHUB_TOKEN,
        'Accept':'application/vnd.github.v3+json',
        'Content-Type':'application/json'
      },
      body: JSON.stringify(body)
    });
    if (!resp.ok) {
      const err = await resp.json();
      // SHA conflict - retry once with fresh SHA
      if (err.message && err.message.includes('sha')) {
        const refetch = await fetch(API_URL, {
          headers: { 'Authorization':'token '+GITHUB_TOKEN, 'Accept':'application/vnd.github.v3+json' }
        });
        if (refetch.ok) {
          const refetchData = await refetch.json();
          body.sha = refetchData.sha;
          const retry = await fetch(API_URL, { method:'PUT', headers:{
            'Authorization':'token '+GITHUB_TOKEN,
            'Accept':'application/vnd.github.v3+json',
            'Content-Type':'application/json'
          }, body:JSON.stringify(body) });
          if (retry.ok) { _dataSha = retry.json().sha; return true; }
        }
      }
      console.log('Push error:', err.message);
      return false;
    }
    const result = await resp.json();
    _dataSha = result.content.sha;
    return true;
  } catch(e) {
    console.log('Push exception:', e.message);
    return false;
  }
}

async function syncNow(silent) {
  const bar = document.getElementById('syncBar');
  if (bar) bar.textContent = '⏳ 同步中…';
  const remote = await fetchRemoteData();
  if (remote) {
    // Merge: remote wins, but preserve local if remote is older/empty
    saveLocal(remote);
    if (bar) bar.textContent = '☁️ 已同步';
    if (!silent) { renderAll(); toast('✅ 数据已同步'); }
    setTimeout(()=>{ if(bar) bar.textContent=''; },3000);
    return true;
  } else {
    if (bar) bar.textContent = '⚠️ 离线（使用本地数据）';
    if (!silent) toast('⚠️ 无法连接，使用本地数据');
    setTimeout(()=>{ if(bar) bar.textContent=''; },4000);
    return false;
  }
}

async function saveAndSync(data) {
  saveLocal(data);
  // Try push in background
  const ok = await pushRemote(data);
  const bar = document.getElementById('syncBar');
  if (ok) {
    if (bar) bar.textContent = '☁️ 已同步到云端';
    setTimeout(()=>{ if(bar) bar.textContent=''; },3000);
  } else {
    if (bar) bar.textContent = '⚠️ 已存本地，联网后自动同步';
    setTimeout(()=>{ if(bar) bar.textContent=''; },5000);
  }
  return ok;
}

function onUserSwitch() {
  const user = getCurrentUser();
  if (user) {
    localStorage.setItem('wuren_me', user);
    toast(`👤 ${user}，你好！`);
  }
  renderCheckin();
}

// ============ RENDER CHECKIN ============
function renderCheckin() {
  const data = getLocal();
  const checkinDateStr = getCheckinDate();
  const checkinDate = new Date(checkinDateStr + 'T00:00:00');
  const today = new Date();
  const todayStr = fmtDate(today);
  const monday = getMonday(checkinDate);
  const sunday = getSunday(monday);
  const isSun = isSunday(checkinDate);
  const isToday = (checkinDateStr === todayStr);
  const currentUser = getCurrentUser();

  // Header date
  document.getElementById('headerDate').textContent = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日 星期${DAYS[today.getDay()===0?6:today.getDay()-1]}`;

  // Date badge
  const badge = document.getElementById('dateBadge');
  badge.textContent = isToday ? '' : '⚠️ 补打卡';

  // Sunday winners
  let sundayWinners = [];
  if (isSun) {
    const lastSun = new Date(checkinDate); lastSun.setDate(lastSun.getDate()-7);
    const predData = data.predictions[fmtDate(lastSun)];
    if (predData && predData.winners) sundayWinners = predData.winners;
  }

  // Sunday notice
  const noticeDiv = document.getElementById('sundayNotice');
  if (isSun) {
    if (sundayWinners.length > 0) {
      noticeDiv.innerHTML = `<div class="sunday-winner">🌟 周日福利！中奖者：<strong>${sundayWinners.join('、')}</strong> 可以打卡</div>`;
    } else {
      noticeDiv.innerHTML = `<div class="sunday-lock">🔒 周日休息。等待预测中奖者揭晓~</div>`;
    }
  } else {
    noticeDiv.innerHTML = '';
  }

  // Encourage
  document.getElementById('dailyEncourage').innerHTML = generateEncourage(data, checkinDateStr, currentUser);

  // Build cards
  let html = '';
  if (!currentUser) {
    html += `<div style="text-align:center;color:var(--sub);padding:20px;">👆 请先在上方选择"我是谁"</div>`;
  }

  PERSONS.forEach(person => {
    const existing = getPersonCheckin(data, person, checkinDateStr);
    const canCheckin = !isSun || sundayWinners.includes(person);
    const isMe = (currentUser === person);
    const cardClass = isMe ? 'card self' : 'card';

    if (isSun && !canCheckin && !existing) {
      html += `<div class="${cardClass}" style="opacity:0.6">
        <div class="person-name">${person} ${isMe?'👈':''}</div>
        <div style="font-size:12px;color:var(--sub);">今日休息</div>
      </div>`;
      return;
    }

    if (existing) {
      // Show read-only result for everyone
      const st = existing.study||0, et = existing.exercise||0;
      html += `<div class="${cardClass}">
        <div class="person-name">${person} ${isMe?'👈':''} <span class="done-badge">✓</span></div>
        <div style="font-size:13px;display:flex;gap:12px;flex-wrap:wrap;">
          <span>📚 学习 <strong>${st}分</strong>${existing.sNote?' — '+existing.sNote:''}</span>
          <span>🏃 运动 <strong>${et}分</strong>${existing.eNote?' — '+existing.eNote:''}</span>
        </div>
        ${isMe ? `<button class="btn btn-outline btn-small" onclick="editMyCheckin()" style="margin-top:6px;">✏️ 修改</button>` : ''}
      </div>`;
    } else if (isMe && canCheckin) {
      // Show input fields ONLY for current user
      html += `<div class="card self" id="myCard">
        <div class="person-name">${person} 👈</div>
        <div class="score-row">
          <div class="score-block">
            <div class="label"><span class="dot s"></span>📚 学习 (0-2分)</div>
            <div class="score-btns">${scoreBtns('study')}</div>
            <input class="note-input" id="sNote" placeholder="学了什么…（选填）">
          </div>
        </div>
        <div class="score-row">
          <div class="score-block">
            <div class="label"><span class="dot e"></span>🏃 运动 (0-2分)</div>
            <div class="score-btns">${scoreBtns('exercise')}</div>
            <input class="note-input" id="eNote" placeholder="做了什么运动…（选填）">
          </div>
        </div>
        <button class="btn btn-primary btn-block" id="btnSave" onclick="saveMyCheckin()" style="margin-top:8px;">💾 保存打卡</button>
      </div>`;
    } else if (!isMe) {
      // Other person, not checked in yet
      html += `<div class="${cardClass}">
        <div class="person-name">${person}</div>
        <div style="font-size:12px;color:var(--sub);">还没打卡~</div>
      </div>`;
    } else if (isSun && !canCheckin) {
      html += `<div class="card self">
        <div class="person-name">${person} 👈</div>
        <div style="font-size:12px;color:#c0392b;">今日不是你打卡，休息一下吧</div>
      </div>`;
    }
  });

  document.getElementById('checkinArea').innerHTML = html;

  // Restore temp selections
  if (window._tmp && (checkinDateStr === window._tmpDate)) {
    [0,0.5,1,1.5,2].forEach(v=>{
      const bs=document.getElementById('bs-'+v), be=document.getElementById('be-'+v);
      if (bs && window._tmp.study===v) bs.classList.add('sel');
      if (be && window._tmp.exercise===v) be.classList.add('sel');
    });
    const sn=document.getElementById('sNote'), en=document.getElementById('eNote');
    if (sn) sn.value = window._tmp.sNote||'';
    if (en) en.value = window._tmp.eNote||'';
  }
}

function scoreBtns(type) {
  const id = type==='study'?'bs':'be';
  return [0,0.5,1,1.5,2].map(v=>
    `<button id="${id}-${v}" onclick="selectScore('${type}',${v})">${v===0?'0':v}</button>`
  ).join('');
}

function selectScore(type, val) {
  if (!window._tmp) window._tmp = {study:0,exercise:0,sNote:'',eNote:''};
  window._tmpDate = getCheckinDate();
  window._tmp[type] = val;
  const prefix = type==='study'?'bs':'be';
  [0,0.5,1,1.5,2].forEach(v=>{
    const btn=document.getElementById(prefix+'-'+v);
    if (btn) btn.classList.toggle('sel', v===val);
  });
  // Reset save button
  const btn=document.getElementById('btnSave');
  if (btn && btn.classList.contains('btn-saved')) {
    btn.textContent='💾 保存打卡'; btn.className='btn btn-primary btn-block';
  }
}

async function saveMyCheckin() {
  const currentUser = getCurrentUser();
  if (!currentUser) { toast('请先选择自己'); return; }
  const checkinDateStr = getCheckinDate();
  const isSun = isSunday(new Date(checkinDateStr+'T00:00:00'));

  // Check Sunday permission
  if (isSun) {
    const d = new Date(checkinDateStr+'T00:00:00');
    const lastSun = new Date(d); lastSun.setDate(lastSun.getDate()-7);
    const data = getLocal();
    const predData = data.predictions[fmtDate(lastSun)];
    const winners = (predData && predData.winners) ? predData.winners : [];
    if (!winners.includes(currentUser)) {
      toast('❌ 今天周日，你不是中奖者，不能打卡');
      return;
    }
  }

  if (!window._tmp) { toast('请选择分数'); return; }

  const data = getLocal();
  const record = {
    study: window._tmp.study||0,
    sNote: (document.getElementById('sNote')?.value||'').trim(),
    exercise: window._tmp.exercise||0,
    eNote: (document.getElementById('eNote')?.value||'').trim()
  };

  if (record.study===0 && record.exercise===0) {
    toast('⚠️ 请至少选择一项分数');
    return;
  }

  if (!data.checkins[currentUser]) data.checkins[currentUser] = {};
  data.checkins[currentUser][checkinDateStr] = record;

  await saveAndSync(data);
  window._tmp = null; window._tmpDate = null;

  const btn = document.getElementById('btnSave');
  if (btn) { btn.textContent='✅ 已保存'; btn.className='btn btn-saved btn-block'; }
  toast('✅ 打卡已保存！');
  setTimeout(()=>{
    if (btn && btn.classList.contains('btn-saved')) {
      btn.textContent='💾 保存打卡'; btn.className='btn btn-primary btn-block';
    }
  },3000);
  renderCheckin();
}

function editMyCheckin() {
  const currentUser = getCurrentUser();
  const checkinDateStr = getCheckinDate();
  const data = getLocal();
  const existing = getPersonCheckin(data, currentUser, checkinDateStr);
  if (!existing) return;
  // Load into temp
  window._tmp = {study:existing.study||0, exercise:existing.exercise||0, sNote:existing.sNote||'', eNote:existing.eNote||''};
  window._tmpDate = checkinDateStr;
  // Remove from data so card shows as editable
  delete data.checkins[currentUser][checkinDateStr];
  saveLocal(data);
  renderCheckin();
}

function renderAll() {
  renderCheckin();
  renderWeekly();
  renderPredict();
  renderHistory();
}

// ============ ENCOURAGEMENT ============
function generateEncourage(data, dateStr, currentUser) {
  const d = new Date(dateStr+'T00:00:00');
  if (d.getDay()===0) return '🌿 周日休息。回顾这周的坚持，你已经很棒了！';

  if (!currentUser) return '👆 请先选择"我是谁"，然后开始打卡吧！';

  const existing = getPersonCheckin(data, currentUser, dateStr);
  if (existing) {
    const total = (existing.study||0)+(existing.exercise||0);
    if (total>=3) return `🔥 太棒了！今天已经拿下 <strong>${total.toFixed(1)}分</strong>，继续保持！`;
    if (total>=1) return `💪 不错！今天已打卡 <strong>${total.toFixed(1)}分</strong>，还能再加把劲~`;
    return `✅ 今日已打卡，哪怕一点点也是进步！`;
  }

  const phrases = [
    '💪 每一次打卡，都是对自己的一次承诺。今天也要加油！',
    '🌟 不积跬步，无以至千里。半小时的学习或运动，都在塑造更好的你。',
    '🔥 坚持不是轰轰烈烈，是每天0.5分、0.5分地积累。',
    '📚 学习和运动，一个滋养头脑，一个强健体魄。',
    '🌈 今天的一小步，是未来的一大步。出发！',
  ];

  // Check how many checked in today
  let count = 0;
  PERSONS.forEach(p => { if (getPersonCheckin(data, p, dateStr)) count++; });
  if (count > 0) {
    return `🌟 今天已有 <strong>${count}</strong> 位伙伴打卡！${count>=3?'团队势头真棒！':'其他伙伴也加油哦~'}`;
  }

  return phrases[new Date().getDate() % phrases.length];
}

// ============ WEEKLY ============
function renderWeekly() {
  const data = getLocal();
  const today = new Date();
  const monday = getMonday(today);
  const sunday = getSunday(monday);
  document.getElementById('weekRange').textContent = `📅 ${fmtWeekRange(monday, sunday)}`;

  let tableHtml = '<table class="week-table"><thead><tr><th>姓名</th>';
  for (let i=0;i<7;i++) {
    const d=new Date(monday);d.setDate(d.getDate()+i);
    tableHtml += `<th class="${i===6?'sun-col':''}">${DAYS[i]}<br>${fmtDateShort(d)}</th>`;
  }
  tableHtml += '<th>合计</th></tr></thead><tbody>';

  const totals = {};
  PERSONS.forEach(person => {
    tableHtml += `<tr><td>${person}</td>`;
    let pt=0;
    for (let i=0;i<7;i++) {
      const d=new Date(monday);d.setDate(d.getDate()+i);
      const c = getPersonCheckin(data, person, fmtDate(d));
      let cell='-';
      if (c) { const sc=(c.study||0)+(c.exercise||0); cell=sc>0?sc.toFixed(1):'-'; pt+=sc; }
      tableHtml += `<td class="${i===6?'sun-col':''}${isSameDay(d,today)?' highlight':''}">${cell}</td>`;
    }
    tableHtml += `<td><strong>${pt.toFixed(1)}</strong></td></tr>`;
    totals[person]=pt;
  });
  tableHtml += '</tbody></table>';
  document.getElementById('weekTable').innerHTML = tableHtml;

  const allTotal = Object.values(totals).reduce((a,b)=>a+b,0);
  let sumHtml = `<div class="total-line">🔥 团队总分：${allTotal.toFixed(1)} 分</div>`;
  PERSONS.forEach(p=>{
    const t=totals[p];
    sumHtml += `<div class="person-line">${p}：<strong>${t.toFixed(1)}分</strong> ${t>=8?'🏆':t>=5?'💪':t>=2?'🌱':'💤'}</div>`;
  });
  document.getElementById('weekSummary').innerHTML = sumHtml;

  // Last prediction
  const predKey = fmtDate(sunday);
  const predData = data.predictions[predKey];
  const resDiv = document.getElementById('lastPredResult');
  if (predData && predData.actual!==null && predData.actual!==undefined) {
    resDiv.innerHTML = `实际总分：<strong>${predData.actual.toFixed(1)}分</strong><br>中奖者：${(predData.winners||[]).join('、')||'无'} 🎉`;
  } else {
    resDiv.innerHTML = '暂无结果，周日揭晓~';
  }
}

// ============ PREDICTIONS ============
function renderPredict() {
  const data = getLocal();
  const today = new Date();
  const monday = getMonday(today);
  const sunday = getSunday(monday);
  const nextMon = new Date(sunday); nextMon.setDate(nextMon.getDate()+1);
  const nextSun = getSunday(nextMon);
  const isSun = isSunday(today);

  document.getElementById('predInfo').innerHTML = isSun
    ? `🗳️ 预测下周（${fmtWeekRange(nextMon, nextSun)}）团队总分`
    : `⏰ 下周日开放预测`;

  const predKey = fmtDate(sunday);
  let existingPreds = (data.predictions[predKey]&&data.predictions[predKey].preds) ? data.predictions[predKey].preds : {};

  let inputs = '';
  PERSONS.forEach(p=>{
    const val = existingPreds[p]!==undefined ? existingPreds[p] : '';
    inputs += `<div class="pred-input-row"><span class="name">${p}</span><input type="number" id="pred-${p}" value="${val}" placeholder="猜总分" step="0.5" min="0" max="40"><span style="font-size:12px;color:var(--sub);">分</span></div>`;
  });
  document.getElementById('predInputs').innerHTML = inputs;
  document.getElementById('predInputs').style.display = isSun?'block':'none';
  document.querySelector('#page-predict .btn-primary').style.display = isSun?'block':'none';

  let hist = '';
  Object.keys(data.predictions).sort().reverse().forEach(key=>{
    const pd=data.predictions[key]; if(!pd) return;
    hist += `<div style="margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);">
      <div style="font-weight:600;font-size:13px;">📅 ${key}</div>
      <div style="font-size:12px;color:var(--sub);">预测周：${pd.weekStart} 起</div>`;
    if (pd.preds) Object.keys(pd.preds).forEach(p=>{ hist += `<span style="font-size:12px;">${p}:${pd.preds[p]}分 </span>`; });
    if (pd.actual!==null && pd.actual!==undefined) {
      hist += `<div style="font-size:12px;color:#27ae60;">实际：${pd.actual.toFixed(1)}分 | 中奖：${(pd.winners||[]).join('、')||'无'}</div>`;
    } else {
      hist += `<div style="font-size:12px;color:var(--sub);">等待揭晓…</div>`;
    }
    hist += '</div>';
  });
  document.getElementById('predHistory').innerHTML = hist || '<div style="font-size:13px;color:var(--sub);">暂无预测记录</div>';
}

async function savePredictions() {
  const data = getLocal();
  const today = new Date();
  if (!isSunday(today)) { toast('只有周日才能提交预测哦~'); return; }

  const monday = getMonday(today);
  const sunday = getSunday(monday);
  const nextMon = new Date(sunday); nextMon.setDate(nextMon.getDate()+1);
  const predKey = fmtDate(sunday);
  if (!data.predictions[predKey]) data.predictions[predKey] = {weekStart:fmtDate(nextMon), preds:{}, actual:null, winners:[]};

  let count=0;
  PERSONS.forEach(p=>{
    const inp=document.getElementById('pred-'+p);
    if (inp && inp.value!=='') { data.predictions[predKey].preds[p]=parseFloat(inp.value)||0; count++; }
  });

  // Calculate LAST week winners
  const lastSun = new Date(sunday); lastSun.setDate(lastSun.getDate()-7);
  const lastKey = fmtDate(lastSun);
  const lastPred = data.predictions[lastKey];
  if (lastPred && lastPred.actual===null) {
    const thisMon = new Date(sunday); thisMon.setDate(thisMon.getDate()-6);
    const actual = getWeekAllTotal(data, thisMon);
    lastPred.actual = actual;
    if (lastPred.preds && Object.keys(lastPred.preds).length>0) {
      let minDiff=Infinity, winners=[];
      Object.keys(lastPred.preds).forEach(p=>{
        const diff=Math.abs(lastPred.preds[p]-actual);
        if (diff<minDiff){minDiff=diff;winners=[p];}
        else if (diff===minDiff){winners.push(p);}
      });
      lastPred.winners = winners;
    }
  }

  await saveAndSync(data);
  toast(`✅ 已保存 ${count} 位预测！`);
  renderPredict();
}

function getWeekAllTotal(data, monday) {
  let total=0;
  PERSONS.forEach(p=>{ total+=getWeekTotal(data,p,monday); });
  return total;
}

function getWeekTotal(data, person, monday) {
  let total=0;
  for (let i=0;i<6;i++) {
    const d=new Date(monday);d.setDate(d.getDate()+i);
    const c=getPersonCheckin(data,person,fmtDate(d));
    if (c) total+=(c.study||0)+(c.exercise||0);
  }
  const sun=getSunday(monday); const sunStr=fmtDate(sun);
  const predData = data.predictions[sunStr];
  if (predData && predData.winners && predData.winners.includes(person)) {
    const c=getPersonCheckin(data,person,sunStr);
    if (c) total+=(c.study||0)+(c.exercise||0);
  }
  return total;
}

// ============ HISTORY ============
function renderHistory() {
  const data = getLocal();
  let expHtml = '';
  PERSONS.forEach(p=>{
    expHtml += `<div style="margin-bottom:6px;"><button class="btn btn-outline btn-small" onclick="exportPerson('${p}')">📥 导出 ${p}</button></div>`;
  });
  expHtml += `<button class="btn btn-outline btn-small" onclick="exportAll()">📥 导出全部汇总</button>`;
  document.getElementById('exportList').innerHTML = expHtml;

  const allDates=new Set();
  PERSONS.forEach(p=>{ if(data.checkins[p]) Object.keys(data.checkins[p]).forEach(d=>allDates.add(d)); });
  const sorted=[...allDates].sort().reverse().slice(0,30);
  if (sorted.length===0) {
    document.getElementById('historyOverview').innerHTML='<div style="font-size:13px;color:var(--sub);">还没有打卡记录</div>';
  } else {
    let tbl='<table class="week-table"><thead><tr><th>日期</th>';
    PERSONS.forEach(p=>{tbl+=`<th>${p.slice(0,2)}</th>`;});
    tbl+='<th>日总</th></tr></thead><tbody>';
    sorted.forEach(dStr=>{
      tbl+=`<tr><td>${dStr.slice(5)}</td>`;
      let dt=0;
      PERSONS.forEach(p=>{
        const c=getPersonCheckin(data,p,dStr);
        const sc=c?(c.study||0)+(c.exercise||0):0; dt+=sc;
        tbl+=`<td>${sc>0?sc.toFixed(1):'-'}</td>`;
      });
      tbl+=`<td><strong>${dt.toFixed(1)}</strong></td></tr>`;
    });
    tbl+='</tbody></table>';
    document.getElementById('historyOverview').innerHTML = tbl;
  }
}

function exportPerson(person) {
  const data=getLocal();
  const records=data.checkins[person]||{};
  const dates=Object.keys(records).sort();
  let txt=`📋 ${person} 打卡记录\n${'═'.repeat(40)}\n\n`;
  let grand=0;
  dates.forEach(d=>{
    const r=records[d];
    const dObj=new Date(d+'T00:00:00');
    const dayName=DAYS[dObj.getDay()===0?6:dObj.getDay()-1];
    const sc=(r.study||0)+(r.exercise||0); grand+=sc;
    txt+=`📅 ${d} 星期${dayName}\n   学习：${r.study||0}分${r.sNote?' — '+r.sNote:''}\n   运动：${r.exercise||0}分${r.eNote?' — '+r.eNote:''}\n   小计：${sc.toFixed(1)}分\n\n`;
  });
  txt+=`${'─'.repeat(40)}\n📊 总计：${grand.toFixed(1)}分 | ${dates.length}天\n导出时间：${new Date().toLocaleString()}\n`;
  downloadFile(`${person}_打卡记录.txt`, txt);
}

function exportAll() {
  const data=getLocal();
  let txt=`📋 五仁打卡汇总\n${'═'.repeat(50)}\n\n`;
  PERSONS.forEach(p=>{
    const records=data.checkins[p]||{};
    const dates=Object.keys(records).sort();
    let total=0; dates.forEach(d=>{ const r=records[d]; total+=(r.study||0)+(r.exercise||0); });
    txt+=`${p}：${total.toFixed(1)}分 | ${dates.length}天\n`;
  });
  txt+=`\n导出时间：${new Date().toLocaleString()}\n`;
  downloadFile('五仁打卡_汇总.txt', txt);
}

function downloadFile(filename, content) {
  const blob=new Blob([content],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast(`✅ 已导出：${filename}`);
}

// ============ TABS ============
function switchTab(idx) {
  document.querySelectorAll('.page').forEach((p,i)=>p.classList.toggle('active',i===idx));
  document.querySelectorAll('nav.tabs button').forEach((b,i)=>b.classList.toggle('active',i===idx));
  if (idx===0) renderCheckin();
  if (idx===1) renderWeekly();
  if (idx===2) renderPredict();
  if (idx===3) renderHistory();
}

// ============ INIT ============
async function init() {
  // Populate user selector
  const sel=document.getElementById('currentUser');
  sel.innerHTML='<option value="">选择自己</option>'+PERSONS.map(p=>`<option value="${p}">${p}</option>`).join('');
  const saved=localStorage.getItem('wuren_me');
  if (saved && PERSONS.includes(saved)) sel.value=saved;

  // Set date to today
  document.getElementById('checkinDate').value = fmtDate(new Date());

  // Sync from GitHub
  await syncNow(true);
  renderAll();

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
}

init();
