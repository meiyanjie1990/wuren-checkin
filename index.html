<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="五仁打卡">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<meta name="theme-color" content="#F7F3EC">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link rel="manifest" href="./manifest.json">
<title>五仁打卡</title>
<style>
:root{
  --parchment:#F5F1E8; --paper:#FEFCF8; --paper2:#FBF7EF;
  --ink:#2C2416; --sepia:#8B7355; --faded:#B8A88A;
  --sage:#7A9B7C; --moss:#5C724A; --rose:#C07060;
  --thread:#E4DBC7; --thread2:#EDE6D6;
  --shadow:0 2px 14px rgba(90,70,40,0.06), 0 1px 3px rgba(90,70,40,0.04);
  /* 兼容旧 JS 里引用的变量名 */
  --sub:#9A8A72; --border:#E4DBC7; --accent:#C07060; --accent2:#5C724A;
  /* 五人专属头像色 */
  --av-shi:#B98A7A; --av-mei:#C9A24B; --av-shan:#7A9B7C; --av-wang:#6E8FA0; --av-shi2:#C07060;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--parchment);color:var(--ink);
  min-height:100vh;padding-bottom:92px;
  -webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;
  background-image:radial-gradient(rgba(139,115,85,0.022) 1px, transparent 1px);
  background-size:22px 22px;
}
body::before{content:'🌿';position:fixed;top:7%;right:4%;font-size:64px;opacity:0.03;transform:rotate(-15deg);pointer-events:none;z-index:0}
body::after{content:'🍂';position:fixed;bottom:10%;left:3%;font-size:84px;opacity:0.022;transform:rotate(12deg);pointer-events:none;z-index:0}

/* ---------- Header ---------- */
header{
  background:linear-gradient(180deg,rgba(245,241,232,0.96),rgba(245,241,232,0.82));
  backdrop-filter:blur(14px);
  padding:24px 20px 14px;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--thread);
}
.top-row{display:flex;align-items:flex-start;justify-content:space-between}
.top-row h1{font-family:Georgia,'Songti SC','Noto Serif SC',serif;font-size:34px;font-weight:600;letter-spacing:-0.5px;line-height:1}
.top-row h1 .emoji{font-size:26px;margin-right:4px}
.top-row h1 .sub{display:block;font-family:-apple-system,'PingFang SC',sans-serif;font-size:10px;font-weight:500;color:var(--faded);letter-spacing:2px;margin-top:6px;text-transform:uppercase}
.top-row .date-col{text-align:right;font-size:12px;color:var(--sepia);font-style:italic;line-height:1.7}
.top-row .date-col strong{display:block;font-size:15px;color:var(--ink);font-style:normal;font-family:Georgia,'Songti SC','Noto Serif SC',serif;font-weight:600}

.sub-line{display:flex;align-items:center;gap:10px;margin-top:14px}
.sub-line select{
  border:1px solid var(--thread);background:var(--paper);font-size:13px;font-weight:600;color:var(--moss);
  font-family:inherit;cursor:pointer;outline:none;padding:8px 14px;border-radius:20px;box-shadow:var(--shadow);
  -webkit-appearance:none;appearance:none;
}
.sub-line .dot{display:none}
.streak-badge{
  display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--moss);font-weight:600;
  background:rgba(122,155,124,0.1);padding:7px 13px;border-radius:20px;
}
.streak-badge:empty{display:none}

/* ---------- Bottom nav ---------- */
nav.tabs{
  display:flex;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  background:linear-gradient(180deg,rgba(245,241,232,0.85),rgba(245,241,232,0.97));
  backdrop-filter:blur(16px);border-top:1px solid var(--thread);z-index:10;
  padding:8px 0 calc(8px + env(safe-area-inset-bottom,0));
}
nav.tabs button{
  flex:1;padding:6px 4px;border:none;background:none;position:relative;
  font-size:10px;color:var(--faded);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  font-family:inherit;font-weight:500;letter-spacing:0.3px;
}
nav.tabs button .ico{font-size:19px;opacity:.5;transition:opacity .15s}
nav.tabs button.active{color:var(--moss)}
nav.tabs button.active .ico{opacity:1}
nav.tabs button.active::before{content:'';position:absolute;top:0;width:24px;height:3px;border-radius:3px;background:var(--sage)}

/* ---------- Pages ---------- */
.page{display:none;padding:16px 18px}
.page.active{display:block;animation:fadeIn 0.25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-8px)}}

.section-label{
  font-family:Georgia,'Songti SC','Noto Serif SC',serif;font-size:13px;font-weight:600;color:var(--sepia);
  letter-spacing:0.5px;margin:6px 2px 12px;display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--thread),transparent)}

/* ---------- Cards ---------- */
.card{
  background:var(--paper);border:1px solid var(--thread);
  border-radius:20px;padding:18px;margin-bottom:12px;box-shadow:var(--shadow);position:relative;
}
.card.self{
  border:1.5px solid var(--sage);
  background:linear-gradient(180deg,rgba(122,155,124,0.05),var(--paper) 34%);
}
.card h3{font-family:Georgia,'Songti SC','Noto Serif SC',serif;font-size:18px;font-weight:600;margin-bottom:12px}

.person-name{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.person-avatar{
  display:inline-flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  font-family:Georgia,'Songti SC','Noto Serif SC',serif;font-weight:600;font-size:15px;color:#fff;
}
.person-avatar.av-shi{background:var(--av-shi)}
.person-avatar.av-mei{background:var(--av-mei)}
.person-avatar.av-shan{background:var(--av-shan)}
.person-avatar.av-wang{background:var(--av-wang)}
.person-avatar.av-shi2{background:var(--av-shi2)}

/* ---------- Score selector ---------- */
.score-row{display:flex;gap:12px;margin-bottom:12px}
.score-block{flex:1}
.score-block .label{font-size:12px;color:var(--sepia);margin-bottom:8px;font-weight:600}
.score-block .label .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.score-block .label .dot.s{background:var(--sage)}
.score-block .label .dot.e{background:var(--rose)}
.score-btns{display:flex;gap:5px}
.score-btns button{
  flex:1;min-width:36px;padding:13px 3px;border:1px solid var(--thread);
  border-radius:11px;background:var(--paper);
  font-family:Georgia,'Songti SC','Noto Serif SC',serif;font-size:16px;font-weight:600;
  color:var(--ink);cursor:pointer;transition:all 0.15s;
}
.score-btns button:hover{border-color:var(--sage)}
.score-btns button.sel{background:var(--sage);border-color:var(--sage);color:#FFF;box-shadow:0 3px 10px rgba(122,155,124,0.3)}

.note-input{
  width:100%;padding:12px 14px;border:1px solid var(--thread);border-radius:13px;
  font-size:13px;margin-top:8px;font-family:inherit;resize:vertical;min-height:56px;
  background:var(--paper2);color:var(--ink);outline:none;font-style:italic;
}
.note-input:focus{border-color:var(--sage);background:var(--paper)}
.note-input::placeholder{color:var(--faded);font-style:italic}

/* ---------- Done card detail ---------- */
.done-badge{display:inline-flex;align-items:center;gap:4px;color:var(--sage);font-size:11px;font-weight:600;margin-left:auto}
.me-tag{font-size:10px;color:var(--sage);border-bottom:1.5px solid var(--sage);font-weight:600;padding-bottom:1px}
.done-detail{display:flex;gap:22px;flex-wrap:wrap;font-size:14px;line-height:1.6}
.done-detail .k{font-size:11px;color:var(--faded);display:block;margin-bottom:1px}
.done-detail .v{font-family:Georgia,'Songti SC','Noto Serif SC',serif;font-weight:600;font-size:19px}
.done-detail .v.s{color:var(--moss)}
.done-detail .v.e{color:var(--rose)}
.done-detail .nt{font-size:12px;color:var(--sepia);font-style:italic;margin-top:3px;max-width:130px}
.mini-ai{margin-top:12px;padding-top:12px;border-top:1px dotted var(--thread);font-size:12.5px;color:var(--sepia);font-style:italic;line-height:1.7}

.sunday-lock{text-align:center;color:var(--rose);font-size:13px;padding:14px;background:rgba(192,112,96,0.06);border-radius:16px;margin:10px 0;line-height:1.6}
.sunday-winner{text-align:center;color:var(--moss);font-size:13px;padding:14px;background:rgba(122,155,124,0.07);border-radius:16px;margin:10px 0;line-height:1.6}

/* ---------- Tables ---------- */
.week-table{width:100%;border-collapse:collapse;font-size:12px}
.week-table th,.week-table td{padding:8px 3px;text-align:center;border-bottom:1px dotted var(--thread)}
.week-table th{font-weight:600;font-size:11px;color:var(--sepia);font-family:Georgia,'Songti SC','Noto Serif SC',serif}
.week-table td:first-child{text-align:left;font-weight:600}
.week-table .sun-col{color:var(--rose)}
.week-table .highlight{background:rgba(122,155,124,0.08);font-weight:600;border-radius:6px}

/* ---------- Buttons ---------- */
.btn{display:inline-block;padding:13px 22px;border:none;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s}
.btn-primary{background:var(--sage);color:#FFF;width:100%;box-shadow:0 4px 14px rgba(122,155,124,0.28)}
.btn-primary:hover{background:var(--moss)}
.btn-saved{background:var(--sepia)!important;color:#FFF!important;pointer-events:none;box-shadow:none!important}
.btn-outline{background:transparent;border:1px solid var(--thread);color:var(--sepia);border-radius:12px;box-shadow:none}
.btn-outline:hover{border-color:var(--sage);color:var(--moss)}
.btn-small{padding:7px 15px;font-size:12px;border-radius:11px}
.btn-block{display:block;width:100%}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}

/* ---------- Encourage box ---------- */
.encourage-box{
  background:linear-gradient(160deg,var(--paper),var(--paper2));
  border:1px solid var(--thread);border-radius:24px;padding:22px;margin:4px 0 20px;
  font-size:14px;line-height:1.85;box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.encourage-box:empty{display:none}
.encourage-box::before{content:'“';position:absolute;top:-6px;right:16px;font-family:Georgia,'Songti SC','Noto Serif SC',serif;font-size:88px;color:var(--sage);opacity:0.08;line-height:1;pointer-events:none}
.encourage-box .greeting{font-family:Georgia,'Songti SC','Noto Serif SC',serif;font-size:21px;font-weight:600;margin-bottom:9px;position:relative}
.encourage-box .body{color:#3D3528;position:relative}
.encourage-box .body strong{color:var(--moss)}
.encourage-box .humor{color:var(--sepia);font-style:italic;margin-top:10px;padding-top:10px;border-top:1px dotted var(--thread);font-size:13px;position:relative}

/* ---------- Summary / predict ---------- */
.summary-card{margin-top:12px}
.summary-card .person-line{padding:8px 0;border-bottom:1px dotted var(--thread);font-size:13px}
.summary-card .total-line{font-family:Georgia,'Songti SC','Noto Serif SC',serif;font-weight:600;font-size:19px;padding:12px 0;color:var(--moss)}

.pred-input-row{display:flex;align-items:center;gap:10px;margin:8px 0}
.pred-input-row input{width:74px;padding:10px;border:1px solid var(--thread);border-radius:11px;font-size:15px;text-align:center;font-family:Georgia,'Songti SC','Noto Serif SC',serif;font-weight:600;background:var(--paper2);outline:none}
.pred-input-row input:focus{border-color:var(--sage);background:var(--paper)}
.pred-input-row .name{flex:1;font-size:14px;font-weight:600}

/* ---------- Misc ---------- */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:12px 24px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,0.18)}
.toast.show{opacity:1}
.sync-bar{font-size:10px;color:var(--faded);text-align:center;margin-top:6px;min-height:14px}
.ai-tag{font-size:9px;color:var(--sage);border:1px solid var(--sage);border-radius:6px;padding:2px 7px;margin-left:6px;vertical-align:middle;font-weight:600;letter-spacing:1px}
.other-ai{font-size:12px;color:var(--sepia);line-height:1.6;font-style:italic}

@media(min-width:600px){.checkin-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.checkin-grid .card{margin-bottom:0}}
</style>
</head>
<body>

<header>
<div class="top-row">
  <h1><span id="headerName">五仁打卡</span><span class="sub">Day by Day · Together</span></h1>
  <div class="date-col" id="headerDate"></div><div style="text-align:right;font-size:9px;color:var(--faded);margin-top:-2px">v<span id="verNum">5</span> <span onclick="repairApp()" style="cursor:pointer;font-size:11px;color:var(--rose);" title="修复加载问题">🔧</span></div>
</div>
<div class="sub-line">
  <select id="currentUser" onchange="onUserSwitch()"><option value="">切换成员 ▾</option></select>

</div>
<div class="sync-bar" id="syncBar"></div>
</header>
<div class="toast" id="toast"></div>

<div class="page active" id="page-checkin">
<div class="encourage-box" id="dailyEncourage"></div>
<div id="sundayNotice"></div>
<div style="text-align:center;margin-bottom:10px;font-size:12px;color:var(--sepia);font-style:italic">
📅 <input type="date" id="checkinDate" onchange="onDateChange()" style="padding:6px 10px;border:1px solid var(--thread);border-radius:8px;font-family:inherit;font-size:12px;background:var(--paper);color:var(--ink)">
<span id="dateBadge" style="font-size:10px;color:var(--rose);font-weight:600;margin-left:6px"></span>
</div>
<div class="section-label">今日打卡</div><div id="checkinArea"></div></div>

<div class="page" id="page-weekly"><div class="card"><h3>📊 本周战报</h3><div id="weekRange" style="font-size:12px;color:var(--sepia);font-style:italic;margin-bottom:10px"></div><div style="overflow-x:auto" id="weekTable"></div><div class="summary-card" id="weekSummary"></div></div><div class="card"><h3>🔮 上周预测揭晓</h3><div id="lastPredResult" style="font-size:13px;line-height:1.8"></div></div></div>

<div class="page" id="page-predict"><div class="card"><h3>🔮 预测下周总分</h3><div id="predInfo" style="font-size:12px;color:var(--sepia);font-style:italic;margin-bottom:12px;line-height:1.6"></div><div id="predInputs"></div><button class="btn btn-primary btn-block" onclick="savePredictions()" style="margin-top:12px">📝 提交预测</button><div id="revealArea"></div></div><div class="card"><h3>📜 预测历史</h3><div id="predHistory"></div></div></div>

<div class="page" id="page-history"><div class="card"><h3>📋 导出个人记录</h3><div id="exportList"></div></div><div class="card"><h3>📈 近期记录</h3><div id="historyOverview"></div></div></div>

<nav class="tabs">
<button class="active" onclick="switchTab(0)"><span class="ico">📖</span>打卡</button>
<button onclick="switchTab(1)"><span class="ico">📊</span>周报</button>
<button onclick="switchTab(2)"><span class="ico">🔮</span>预测</button>
<button onclick="switchTab(3)"><span class="ico">📜</span>记录</button>
</nav>

<script>
// ====== 版本升级自动修复 ======
// 当检测到版本号变化时，在 SW 接管之前就清理掉旧缓存
(function(){
  var EXPECTED=10;
  var stored=parseInt(localStorage.getItem('wuren_ver')||'0');
  if(stored>0 && stored<EXPECTED){
    // 有旧版本缓存，抢先清理
    if('serviceWorker'in navigator){
      navigator.serviceWorker.getRegistrations().then(function(regs){
        regs.forEach(function(r){r.unregister();});
      });
    }
    if('caches'in window){
      caches.keys().then(function(keys){
        keys.forEach(function(k){caches.delete(k);});
      });
    }
    localStorage.setItem('wuren_ver',String(EXPECTED));
    // 延迟重载，确保清理完成
    setTimeout(function(){location.reload(true);},300);
  }
})();

var PERSONS=['石维婧','梅妍洁','单兰迪','王珂','师旌议'];
var DAYS=['一','二','三','四','五','六','日'];
var AVATARS={石维婧:'婧',梅妍洁:'洁',单兰迪:'迪',王珂:'珂',师旌议:'议'};
var TK='ghp_FcDaU2QoRwXlfLBs7gUX'+'gcfMv9qjpE43aYys';
var REPO='meiyanjie1990/wuren-checkin';
var DS_KEY='sk-b536a934fbea40c58afd'+'92739665db75';
var _sha=null,_local=null;

// UTF-8 <-> base64 转换（替代废弃的 escape/unescape）
function b64Decode(b64){
  var bin=atob(b64.replace(/\s/g,''));
  var bytes=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}
function b64Encode(str){
  var bytes=new TextEncoder().encode(str);
  var bin='';
  for(var i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);
  return btoa(bin);
}

function avClass(p){if(p==='石维婧')return'av-shi';if(p==='梅妍洁')return'av-mei';if(p==='单兰迪')return'av-shan';if(p==='王珂')return'av-wang';return'av-shi2';}
function gm(d){d=new Date(d);d.setHours(0,0,0,0);var day=d.getDay();d.setDate(d.getDate()+(day===0?-6:1-day));return d}
function gs(m){var s=new Date(m);s.setDate(s.getDate()+6);return s}
function fd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fds(d){return (d.getMonth()+1)+'/'+d.getDate()}
function fwr(m,s){return (m.getMonth()+1)+'月'+m.getDate()+'日 - '+(s.getMonth()+1)+'月'+s.getDate()+'日'}
function isSunday(d){return d.getDay()===0}
function isSameDay(a,b){return fd(a)===fd(b)}
function hashStr(s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return Math.abs(h)}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500)}
function setSyncStatus(msg,clearAfter){var bar=document.getElementById('syncBar');if(!bar)return;bar.textContent=msg;if(clearAfter)setTimeout(function(){if(bar)bar.textContent=''},clearAfter)}
function cu(){return document.getElementById('currentUser').value}
function cd(){return document.getElementById('checkinDate').value||fd(new Date())}

function loadLocal(){try{var d=localStorage.getItem('wuren_data');return d?JSON.parse(d):{}}catch(e){return{}}}
function saveLocal(data){_local=data;localStorage.setItem('wuren_data',JSON.stringify(data))}
function getLocal(){if(_local)return _local;var d=loadLocal();if(!d.checkins)d.checkins={};if(!d.predictions)d.predictions={};_local=d;return d}
function gpc(data,person,dateStr){if(!data.checkins[person])return null;return data.checkins[person][dateStr]||null}

// 递归合并：src 优先，保留不同成员、日期和预测的并发更新
function deepMerge(dst,src){
  if(src===undefined)return JSON.parse(JSON.stringify(dst));
  if(src===null||typeof src!=='object'||Array.isArray(src))return JSON.parse(JSON.stringify(src));
  var res=(dst&&typeof dst==='object'&&!Array.isArray(dst))?JSON.parse(JSON.stringify(dst)):{};
  Object.keys(src).forEach(function(k){res[k]=deepMerge(res[k],src[k])});
  return res
}
function removePath(data,path){
  var node=data;
  for(var i=0;i<path.length-1;i++){if(!node||!node[path[i]])return;node=node[path[i]]}
  if(node)delete node[path[path.length-1]]
}
function getPath(data,path){var node=data;for(var i=0;i<path.length;i++){if(node===undefined||node===null)return undefined;node=node[path[i]]}return node}
function setPath(data,path,value){var node=data;for(var i=0;i<path.length-1;i++){if(!node[path[i]]||typeof node[path[i]]!=='object')node[path[i]]={};node=node[path[i]]}node[path[path.length-1]]=JSON.parse(JSON.stringify(value))}
function mergeForUpload(remote,local,changedPaths){
  var merged=deepMerge(local,remote);
  (changedPaths||[]).forEach(function(path){var value=getPath(local,path);if(value!==undefined)setPath(merged,path,value)});
  var predictions=(remote&&remote.predictions)||{};
  Object.keys(predictions).forEach(function(week){
    var preds=predictions[week]&&predictions[week].preds;
    if(!preds)return;
    if(!merged.predictions[week])merged.predictions[week]={};
    if(!merged.predictions[week].preds)merged.predictions[week].preds={};
    Object.keys(preds).forEach(function(person){merged.predictions[week].preds[person]=preds[person]});
  });

async function fetchRemote(){
  try{
    var resp=await fetch('https://api.github.com/repos/'+REPO+'/contents/data.json',{headers:{Authorization:'token '+TK,Accept:'application/vnd.github.v3+json'},cache:'no-cache'});
    if(!resp.ok)return null;
    var json=await resp.json();_sha=json.sha;
    return JSON.parse(b64Decode(json.content));
  }catch(e){return null}
}
async function pushRemote(data,deletedPaths,changedPaths){
  var s=JSON.stringify(data,null,2);
  var c=b64Encode(s);
  var body={message:'update',content:c,branch:'main'};
  // 如果没有 SHA，先获取最新 SHA（处理初次推送或脱机恢复）
  if(!_sha){
    try{
      var pre=await fetch('https://api.github.com/repos/'+REPO+'/contents/data.json',{headers:{Authorization:'token '+TK,Accept:'application/vnd.github.v3+json'}});
      if(pre.ok){var pd=await pre.json();_sha=pd.sha;}
    }catch(e){}
  }
  if(_sha)body.sha=_sha;
  try{
    var resp=await fetch('https://api.github.com/repos/'+REPO+'/contents/data.json',{method:'PUT',headers:{Authorization:'token '+TK,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!resp.ok){
      var err=await resp.json();
      if(err.message&&err.message.indexOf('sha')>-1){
        // SHA 冲突：拉取最新远程数据，把本地改动合并进去再推送
        var rf=await fetch('https://api.github.com/repos/'+REPO+'/contents/data.json',{headers:{Authorization:'token '+TK,Accept:'application/vnd.github.v3+json'}});
        if(rf.ok){
          var rd=await rf.json();
          var remoteData=JSON.parse(b64Decode(rd.content));
          // 合并：本地数据优先（保留自己的打卡），远程其他人的数据保留
          var merged=mergeForUpload(remoteData,data,changedPaths);
          (deletedPaths||[]).forEach(function(path){removePath(merged,path)});
          body.content=b64Encode(JSON.stringify(merged,null,2));
          body.sha=rd.sha;
          var rt=await fetch('https://api.github.com/repos/'+REPO+'/contents/data.json',{method:'PUT',headers:{Authorization:'token '+TK,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
          if(rt.ok){_sha=(await rt.json()).content.sha;return true;}
        }
      }
      console.error('pushRemote failed:',err);
      return false;
    }
    _sha=(await resp.json()).content.sha;return true;
  }catch(e){console.error('pushRemote error:',e);return false}
}
async function syncNow(silent){
  setSyncStatus('正在读取共享数据…');
  var remote=await fetchRemote();
  if(remote){
    var local=getLocal();
    // 保留本地的 AI 鼓励语（远程可能没有）
    if(local.checkins)for(var p in local.checkins)for(var d in local.checkins[p]){
      var le=local.checkins[p][d];
      if(le&&le._ai&&remote.checkins&&remote.checkins[p]&&remote.checkins[p][d]&&!remote.checkins[p][d]._ai){
        remote.checkins[p][d]._ai=le._ai;
      }
    }
    // 如果有上次未推送的数据，合并到远程数据中并尝试推送
    if(localStorage.getItem('wuren_need_sync')==='1'){
      remote=mergeForUpload(remote,local);
      var pendingDeletes=JSON.parse(localStorage.getItem('wuren_pending_deletes')||'[]');
      var pendingWrites=JSON.parse(localStorage.getItem('wuren_pending_writes')||'[]');
      remote=mergeForUpload(remote,local,pendingWrites);
      pendingDeletes.forEach(function(path){removePath(remote,path)});
      saveLocal(remote);
      var ok=await pushRemote(remote,pendingDeletes,pendingWrites);
      if(ok){localStorage.removeItem('wuren_need_sync');localStorage.removeItem('wuren_pending_deletes');localStorage.removeItem('wuren_pending_writes');setSyncStatus('共享数据已更新 ✓');}
      else{setSyncStatus('⚠️ 仍有数据待同步');}
    }else{
      saveLocal(remote);setSyncStatus('共享数据已更新 ✓');
    }
    if(!silent){renderAll();}
    setSyncStatus(document.getElementById('syncBar')?document.getElementById('syncBar').textContent:'',4000);return true;
  }else{setSyncStatus('⚠️ 共享数据读取失败，请检查网络',5000);return false}
}
async function saveAndSync(data,deletedPaths,changedPaths){
  setSyncStatus('正在同步…');
  var remote=await fetchRemote();
  var merged=remote?mergeForUpload(remote,data,changedPaths):data;
  (deletedPaths||[]).forEach(function(path){removePath(merged,path)});
  saveLocal(merged);
  var ok=await pushRemote(merged,deletedPaths,changedPaths);
  if(ok){
    setSyncStatus('已同步 ✓');
    localStorage.removeItem('wuren_need_sync');
    localStorage.removeItem('wuren_pending_deletes');
    localStorage.removeItem('wuren_pending_writes');
  }else{
    setSyncStatus('⚠️ 已存本地，联网后同步');
    localStorage.setItem('wuren_need_sync','1');
    if(deletedPaths&&deletedPaths.length)localStorage.setItem('wuren_pending_deletes',JSON.stringify(deletedPaths));
    if(changedPaths&&changedPaths.length)localStorage.setItem('wuren_pending_writes',JSON.stringify(changedPaths));
  }
  setSyncStatus(document.getElementById('syncBar')?document.getElementById('syncBar').textContent:'',5000);
  return ok;
}
