<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fef9f3;--card:#fff;--text:#3d3427;--sub:#9b8e7c;--accent:#f0883e;--accent2:#55a392;--border:#efe8db;--shadow:0 2px 16px rgba(80,50,20,0.05);--radius:16px}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#fef9f3 0%,#fdf5ea 50%,#faf3e6 100%);color:var(--text);min-height:100vh;padding-bottom:80px;-webkit-tap-highlight-color:transparent}
header{background:linear-gradient(135deg,#fffbf5,#fff8ef);padding:18px 20px 14px;text-align:center;box-shadow:0 1px 20px rgba(60,40,20,0.04);position:sticky;top:0;z-index:10;border-bottom:1px solid #f0e8d8}
header h1{font-size:22px;font-weight:800;letter-spacing:1px}
header .date{font-size:12px;color:var(--sub);margin-top:3px}
.user-bar{margin-top:10px;display:flex;gap:6px;align-items:center;justify-content:center;flex-wrap:wrap}
.user-bar select,.user-bar input{padding:7px 12px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;font-family:inherit;background:#fffdf9}
nav.tabs{display:flex;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-top:1px solid var(--border);z-index:10;padding:4px 0 6px;padding-bottom:calc(6px + env(safe-area-inset-bottom,0))}
nav.tabs button{flex:1;padding:8px 4px 6px;border:none;background:none;font-size:11px;color:var(--sub);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color 0.2s}
nav.tabs button .ico{font-size:22px;line-height:1}
nav.tabs button.active{color:var(--accent);font-weight:700}
.page{display:none;padding:14px}
.page.active{display:block;animation:fadeIn 0.25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-8px)}}
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border)}
.card.self{border:2px solid var(--accent);background:linear-gradient(135deg,#fffdf7,#fff9f0);box-shadow:0 4px 20px rgba(240,136,62,0.1)}
.card h3{font-size:16px;margin-bottom:10px}
.person-name{font-size:16px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.person-avatar{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:16px}
.score-row{display:flex;gap:10px;margin-bottom:8px}
.score-block{flex:1}
.score-block .label{font-size:12px;color:var(--sub);margin-bottom:5px;font-weight:600}
.score-block .label .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:4px;vertical-align:middle}
.score-block .label .dot.s{background:var(--accent2)}.score-block .label .dot.e{background:var(--accent)}
.score-btns{display:flex;gap:4px}
.score-btns button{flex:1;min-width:36px;padding:10px 3px;border:2px solid #e8e1d4;border-radius:10px;background:#fdfbf6;font-size:14px;font-weight:700;color:var(--text);cursor:pointer;transition:all 0.18s}
.score-btns button:hover{background:#fff5ea;border-color:#f0c898}
.score-btns button.sel{border-color:var(--accent);background:#fff3e8;color:var(--accent);box-shadow:0 2px 8px rgba(240,136,62,0.15);transform:scale(1.03)}
.note-input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;margin-top:6px;font-family:inherit;resize:none;height:38px;background:#fdfbf7;transition:border-color 0.2s}
.note-input:focus{border-color:var(--accent);outline:none;background:#fff}
.done-badge{display:inline-block;background:#e6f5ef;color:#388e6b;font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600}
.sunday-lock{text-align:center;color:#d3545a;font-size:13px;padding:12px;background:#fef7f7;border-radius:12px;margin:10px 0;line-height:1.6}
.sunday-winner{text-align:center;color:#27ae60;font-size:13px;padding:12px;background:#f2faf6;border-radius:12px;margin:10px 0;line-height:1.6}
.week-table{width:100%;border-collapse:collapse;font-size:12px}
.week-table th,.week-table td{padding:6px 3px;text-align:center;border-bottom:1px solid #f5f0e8}
.week-table th{font-weight:700;font-size:11px;color:var(--sub)}
.week-table td:first-child{text-align:left;font-weight:600}
.week-table .sun-col{color:#c0392b;background:#fef9f9}
.week-table .highlight{background:#fffdf4;font-weight:700;box-shadow:inset 0 0 0 1px var(--accent);border-radius:4px}
.btn{display:inline-block;padding:10px 20px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s;letter-spacing:0.5px}
.btn-primary{background:linear-gradient(135deg,#f0883e,#e67a30);color:#fff;box-shadow:0 3px 12px rgba(240,136,62,0.25)}
.btn-saved{background:linear-gradient(135deg,#55a392,#489b85)!important;color:#fff!important;box-shadow:0 3px 12px rgba(85,163,146,0.25)!important;pointer-events:none}
.btn-outline{background:#fff;border:2px solid var(--accent);color:var(--accent)}
.btn-small{padding:6px 14px;font-size:12px;border-radius:9px}
.btn-block{display:block;width:100%}.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.encourage-box{background:linear-gradient(135deg,#fffbf5,#fff6ea);border-left:4px solid var(--accent);padding:16px 18px;border-radius:0 14px 14px 0;margin:12px 0;font-size:14px;line-height:1.8;box-shadow:0 2px 8px rgba(240,136,62,0.06)}
.encourage-box .greeting{font-size:17px;font-weight:800;margin-bottom:6px}
.encourage-box .body{color:#5c4d38}.encourage-box .humor{color:#9b8e7c;font-style:italic;margin-top:6px}
.summary-card{margin-top:10px}.summary-card .person-line{padding:6px 0;border-bottom:1px solid #f8f5f0;font-size:14px}
.summary-card .total-line{font-weight:800;font-size:16px;padding:10px 0;color:var(--accent)}
.pred-input-row{display:flex;align-items:center;gap:10px;margin:6px 0}
.pred-input-row input{width:70px;padding:9px;border:2px solid var(--border);border-radius:10px;font-size:15px;text-align:center;font-family:inherit;font-weight:600}
.pred-input-row .name{flex:1;font-size:14px;font-weight:600}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#3d3427;color:#fff;padding:12px 24px;border-radius:24px;font-size:14px;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.toast.show{opacity:1}
.sync-bar{font-size:11px;color:var(--sub);text-align:center;margin-top:5px;min-height:16px}
@media(min-width:600px){.checkin-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.checkin-grid .card{margin-bottom:0}}
</style>
</head>
<body>
<header><h1>🥜 五仁打卡</h1><div class="date" id="headerDate"></div>
<div class="user-bar"><span style="font-size:13px;font-weight:600">👤 我是</span>
<select id="currentUser" onchange="onUserSwitch()"><option value="">选择自己</option></select>
<button class="btn btn-outline btn-small" onclick="syncNow()">🔄 同步</button></div>
<div class="sync-bar" id="syncBar"></div></header>
<div class="toast" id="toast"></div>

<!-- 打卡页 -->
<div class="page active" id="page-checkin">
<div class="encourage-box" id="dailyEncourage"></div>
<div id="sundayNotice"></div>
<div style="text-align:center;margin-bottom:10px;font-size:13px;color:var(--sub)">
📅 <input type="date" id="checkinDate" onchange="renderCheckin()" style="padding:6px 10px;border-radius:8px;border:1.5px solid var(--border);font-family:inherit;font-size:13px;background:#fffdf9">
<span id="dateBadge" style="font-size:11px;color:#c0392b;font-weight:600;margin-left:6px"></span></div>
<div id="checkinArea"></div></div>

<!-- 周报页 -->
<div class="page" id="page-weekly"><div class="card"><h3>📊 本周战报</h3>
<div id="weekRange" style="font-size:13px;color:var(--sub);margin-bottom:10px"></div>
<div style="overflow-x:auto" id="weekTable"></div><div class="summary-card" id="weekSummary"></div></div>
<div class="card"><h3>🔮 上周预测揭晓</h3><div id="lastPredResult" style="font-size:14px;line-height:1.8"></div></div></div>

<!-- 预测页 -->
<div class="page" id="page-predict"><div class="card"><h3>🔮 预测下周总分</h3>
<div id="predInfo" style="font-size:13px;color:var(--sub);margin-bottom:12px;line-height:1.6"></div>
<div id="predInputs"></div><button class="btn btn-primary btn-block" onclick="savePredictions()" style="margin-top:12px">📝 提交预测</button></div>
<div class="card"><h3>📜 预测历史</h3><div id="predHistory"></div></div></div>

<!-- 记录页 -->
<div class="page" id="page-history"><div class="card"><h3>📋 导出个人记录</h3><div id="exportList"></div></div>
<div class="card"><h3>📈 近期记录</h3><div id="historyOverview"></div></div></div>

<nav class="tabs">
<button class="active" onclick="switchTab(0)"><span class="ico">📝</span>打卡</button>
<button onclick="switchTab(1)"><span class="ico">📊</span>周报</button>
<button onclick="switchTab(2)"><span class="ico">🔮</span>预测</button>
<button onclick="switchTab(3)"><span class="ico">📋</span>记录</button>
</nav>

<script>
// ===== CONFIG =====
const PERSONS=['石维婧','梅妍洁','单兰迪','王珂','师旌议'];
const DAYS=['一','二','三','四','五','六','日'];
const AVATARS={石维婧:'🌸',梅妍洁:'🥜',单兰迪:'🌟',王珂:'🍃',师旌议:'🔥'};
const TK='ghp_Ry5Qgv1WAuuUTXdU5BNjFYy'+'IeJyvbj1HGOvE';
const REPO='meiyanjie1990/wuren-checkin';
const API_URL=`https://api.github.com/repos/${REPO}/contents/data.json`;
const DS_KEY='sk-b536a934fbea40c58afd'+'92739665db75';
const APP_VER=21;

// ===== HELPERS =====
function getMonday(d){d=new Date(d);d.setHours(0,0,0,0);const day=d.getDay();d.setDate(d.getDate()+(day===0?-6:1-day));return d}
function getSunday(m){const s=new Date(m);s.setDate(s.getDate()+6);return s}
function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtDateShort(d){return (d.getMonth()+1)+'/'+d.getDate()}
function fmtWeekRange(m,s){return (m.getMonth()+1)+'月'+m.getDate()+'日 - '+(s.getMonth()+1)+'月'+s.getDate()+'日'}
function isSunday(d){return d.getDay()===0}
function isSameDay(a,b){return fmtDate(a)===fmtDate(b)}
function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return Math.abs(h)}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function getCurrentUser(){return document.getElementById('currentUser').value}
function getCheckinDate(){return document.getElementById('checkinDate').value||fmtDate(new Date())}

// ===== DATA =====
let _dataSha=null,_localData=null;
function loadLocal(){try{const d=localStorage.getItem('wuren_data');return d?JSON.parse(d):{}}catch(e){return{}}}
function saveLocal(data){_localData=data;localStorage.setItem('wuren_data',JSON.stringify(data))}
function getLocal(){if(_localData)return _localData;let d=loadLocal();if(!d.checkins)d.checkins={};if(!d.predictions)d.predictions={};_localData=d;return d}
function getPersonCheckin(data,person,dateStr){if(!data.checkins[person])return null;return data.checkins[person][dateStr]||null}

// ===== GITHUB SYNC =====
async function fetchRemoteData(){
  try{
    const resp=await fetch(API_URL,{headers:{Authorization:'token '+TK,Accept:'application/vnd.github.v3+json'},cache:'no-cache'});
    if(!resp.ok)return null;
    const json=await resp.json();_dataSha=json.sha;
    const raw=atob(json.content.replace(/\s/g,''));
    return JSON.parse(decodeURIComponent(escape(raw)));
  }catch(e){console.log('Fetch err:',e.message);return null}
}
async function pushRemote(data){
  const jsonStr=JSON.stringify(data,null,2);
  const content=btoa(unescape(encodeURIComponent(jsonStr)));
  const body={message:'update',content,branch:'main'};
  if(_dataSha)body.sha=_dataSha;
  try{
    const resp=await fetch(API_URL,{method:'PUT',headers:{Authorization:'token '+TK,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!resp.ok){const err=await resp.json();if(err.message&&err.message.includes('sha')){const refetch=await fetch(API_URL,{headers:{Authorization:'token '+TK,Accept:'application/vnd.github.v3+json'}});if(refetch.ok){const rd=await refetch.json();body.sha=rd.sha;const retry=await fetch(API_URL,{method:'PUT',headers:{Authorization:'token '+TK,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});if(retry.ok){_dataSha=(await retry.json()).content.sha;return true}}}return false}
    const result=await resp.json();_dataSha=result.content.sha;return true;
  }catch(e){console.log('Push err:',e.message);return false}
}
async function syncNow(silent){
  const bar=document.getElementById('syncBar');if(bar)bar.textContent='syncing...';
  const remote=await fetchRemoteData();
  if(remote){
    // Merge: keep local AI replies that remote is missing
    const local=getLocal();
    if(local.checkins)for(const p in local.checkins)for(const d in local.checkins[p]){
      const le=local.checkins[p][d],re=remote.checkins?.[p]?.[d];
      if(le&&le._ai&&re&&!re._ai){if(!remote.checkins[p])remote.checkins[p]={};if(!remote.checkins[p][d])remote.checkins[p][d]={};remote.checkins[p][d]._ai=le._ai}
    }
    saveLocal(remote);if(bar)bar.textContent='OK';if(!silent){renderAll();toast('synced')}
    setTimeout(()=>{if(bar)bar.textContent=''},3000);return true;
  }else{if(bar)bar.textContent='offline';if(!silent)toast('offline');setTimeout(()=>{if(bar)bar.textContent=''},4000);return false}
}
async function saveAndSync(data){saveLocal(data);const ok=await pushRemote(data);const bar=document.getElementById('syncBar');if(ok){bar.textContent='OK';setTimeout(()=>{bar.textContent=''},3000)}else{bar.textContent='saved locally';setTimeout(()=>{bar.textContent=''},5000)};return ok}
function onUserSwitch(){const user=getCurrentUser();if(user){localStorage.setItem('wuren_me',user);toast(user+'!')}renderCheckin()}

// ===== AI (DeepSeek) =====
async function callAI(personName,studyScore,studyNote,exerciseScore,exerciseNote,streak,weekDone,dayOfWeek,timeGreeting){
  const parts=[];
  if(studyScore>0)parts.push('学习'+studyScore+'分'+(studyNote?'，内容：'+studyNote:''));
  if(exerciseScore>0)parts.push('运动'+exerciseScore+'分'+(exerciseNote?'，内容：'+exerciseNote:''));
  if(parts.length===0)return null;
  const prompt='你是一个打卡App里的鼓励助手，给30-40岁的自律成年人写温暖的打卡反馈。口语化，像朋友之间。40-60字，轻松自然，可以有一点冷幽默。直接给回复。\n时间：'+timeGreeting+'\n用户：'+personName+'\n'+parts.join('；')+'\n连续打卡：'+streak+'天\n本周已打卡：'+weekDone+'天\n根据ta写的内容给定制反馈，回应ta具体做了什么。';
  try{
    const resp=await fetch('https://api.deepseek.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+DS_KEY},body:JSON.stringify({model:'deepseek-chat',messages:[{role:'user',content:prompt}],max_tokens:150,temperature:0.9}),signal:AbortSignal.timeout(8000)});
    if(!resp.ok)return null;
    const data=await resp.json();
    const reply=data.choices?.[0]?.message?.content?.trim();
    return (reply&&reply.length>2)?reply:null;
  }catch(e){return null}
}

// ===== ENCOURAGEMENT =====

function generateMiniEnc(data,dateStr,person){
  const existing=getPersonCheckin(data,person,dateStr);
  if(!existing)return'';
  const total=(existing.study||0)+(existing.exercise||0);
  if(total===0)return'';
  const avatar=AVATARS[person]||'👤';
  if(existing._ai){const s=existing._ai.length>40?existing._ai.slice(0,40)+'...':existing._ai;return'<div style="display:flex;align-items:flex-start;gap:6px;margin-bottom:6px;padding:4px 0;border-bottom:1px solid #f5f5f5"><span style="font-size:16px">'+avatar+'</span><span><strong>'+person+'</strong> '+total.toFixed(1)+'分<br><span style="color:#5c4d38">'+s+'</span></span></div>'}
  const r1=(existing.study||0)>0?noteReaction(existing.sNote||'','study'):null;
  const r2=(existing.exercise||0)>0?noteReaction(existing.eNote||'','exercise'):null;
  const r=r1||r2||'';
  const sr=r?(r.includes('。')?r.split('。')[0]:r.slice(0,30)):'';
  return'<div style="display:flex;align-items:flex-start;gap:6px;margin-bottom:4px"><span style="font-size:16px">'+avatar+'</span><span><strong>'+person+'</strong> '+total.toFixed(1)+'分<br>'+sr+'</span></div>';
}

function countStreak(data,person){let s=0;const d=new Date();d.setDate(d.getDate()-1);while(d.getFullYear()>=2026){const c=getPersonCheckin(data,person,fmtDate(d));if(!c||((c.study||0)+(c.exercise||0))===0)break;s++;d.setDate(d.getDate()-1)}return s}
function countWeeklyDone(data,person){const today=new Date();const monday=getMonday(today);let days=0;for(let i=0;i<6;i++){const d=new Date(monday);d.setDate(d.getDate()+i);const c=getPersonCheckin(data,person,fmtDate(d));if(c&&((c.study||0)+(c.exercise||0))>0)days++}return days}

    const hour=new Date().getHours();
    const tg=hour<7?'清晨':hour<10?'上午':hour<13?'中午':hour<17?'下午':hour<20?'傍晚':'晚上';
    const day=new Date(checkinDateStr+'T00:00:00').getDay()||7;
    callAI(currentUser,record.study||0,record.sNote||'',record.exercise||0,record.eNote||'',streak,weekDone,day,tg).then(async(aiReply)=>{
      if(aiReply){
        const d2=getLocal();
        if(d2.checkins[currentUser]&&d2.checkins[currentUser][checkinDateStr]){d2.checkins[currentUser][checkinDateStr]._ai=aiReply;saveLocal(d2);await pushRemote(d2)}
        const encDiv=document.getElementById('dailyEncourage');if(encDiv){encDiv.innerHTML=generateEncourage(getLocal(),checkinDateStr,currentUser);setTimeout(()=>renderCheckin(),800)}
      }
    });
  }
}

function editMy(){const cu=getCurrentUser();const ds=getCheckinDate();const data=getLocal();const ex=getPersonCheckin(data,cu,ds);if(!ex)return;window._tmp={study:ex.study||0,exercise:ex.exercise||0,sNote:ex.sNote||'',eNote:ex.eNote||''};window._tmpDate=ds;delete data.checkins[cu][ds];saveLocal(data);renderCheckin()}

async function deleteMy(){const cu=getCurrentUser();const ds=getCheckinDate();const data=getLocal();const ex=getPersonCheckin(data,cu,ds);if(!ex)return;if(!confirm('确定撤销 '+cu+' 在 '+ds+' 的打卡？'))return;delete data.checkins[cu][ds];await saveAndSync(data);window._tmp=null;window._tmpDate=null;toast('已撤销');renderCheckin()}

// ===== WEEKLY =====
function renderWeekly(){
  const data=getLocal();const today=new Date();const monday=getMonday(today);const sunday=getSunday(monday);
  document.getElementById('weekRange').textContent=fmtWeekRange(monday,sunday);
  let tbl='<table class="week-table"><thead><tr><th>姓名</th>';
  for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(d.getDate()+i);tbl+='<th class="'+(i===6?'sun-col':'')+'">'+DAYS[i]+'<br>'+fmtDateShort(d)+'</th>'}tbl+='<th>合计</th></tr></thead><tbody>';
  const totals={};
  PERSONS.forEach(person=>{tbl+='<tr><td>'+person+'</td>';let pt=0;for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(d.getDate()+i);const c=getPersonCheckin(data,person,fmtDate(d));let cell='-';if(c){const sc=(c.study||0)+(c.exercise||0);cell=sc>0?sc.toFixed(1):'-';pt+=sc}tbl+='<td class="'+(i===6?'sun-col':'')+(isSameDay(d,today)?' highlight':'')+'">'+cell+'</td>'}tbl+='<td><strong>'+pt.toFixed(1)+'</strong></td></tr>';totals[person]=pt});
  tbl+='</tbody></table>';document.getElementById('weekTable').innerHTML=tbl;
  const allTotal=Object.values(totals).reduce((a,b)=>a+b,0);
  let sum='<div class="total-line">团队总分：'+allTotal.toFixed(1)+' 分</div>';
  [...PERSONS].sort((a,b)=>totals[b]-totals[a]).forEach((p,i)=>{const t=totals[p];sum+='<div class="person-line">'+(i===0?'🥇':i===1?'🥈':i===2?'🥉':'')+' '+p+'：<strong>'+t.toFixed(1)+'分</strong> '+(t>=8?'太强':t>=5?'稳定':t>=2?'在路上':'加油')+'</div>'});
  document.getElementById('weekSummary').innerHTML=sum;
  const predData=data.predictions[fmtDate(sunday)];
  document.getElementById('lastPredResult').innerHTML=predData&&predData.actual!=null?'实际：<strong>'+predData.actual.toFixed(1)+'分</strong> 中奖：<strong>'+(predData.winners||[]).join('、')+'</strong>':'本周未结束，周日揭晓~';
}

// ===== PREDICTIONS =====
function renderPredict(){
  const data=getLocal();const today=new Date();const monday=getMonday(today);const sunday=getSunday(monday);
  const nextMon=new Date(sunday);nextMon.setDate(nextMon.getDate()+1);const nextSun=getSunday(nextMon);const isSun=isSunday(today);
  document.getElementById('predInfo').innerHTML=isSun?'预测下周（'+fmtWeekRange(nextMon,nextSun)+'）团队总分<br><span style="font-size:12px">最准的人获下周周日打卡权。预测保密</span>':'周日开放预测<br><span style="font-size:12px">猜下周团队总分，最接近的获周日打卡权</span>';
  const predKey=fmtDate(sunday);let existingPreds=(data.predictions[predKey]&&data.predictions[predKey].preds)?data.predictions[predKey].preds:{};
  let inputs='';PERSONS.forEach(p=>{const val=existingPreds[p]!==undefined?existingPreds[p]:'';inputs+='<div class="pred-input-row"><span class="name">'+p+'</span><input type="number" id="pred-'+p+'" value="'+val+'" placeholder="猜总分" step="0.5" min="0" max="40"><span style="font-size:12px;color:var(--sub)">分</span></div>'});
  document.getElementById('predInputs').innerHTML=inputs;document.getElementById('predInputs').style.display=isSun?'block':'none';
  document.querySelector('#page-predict .btn-primary').style.display=isSun?'block':'none';
  let hist='';Object.keys(data.predictions).sort().reverse().forEach(key=>{const pd=data.predictions[key];if(!pd||pd.actual===null||pd.actual===undefined)return;hist+='<div style="margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f5f0e8"><div style="font-weight:700;font-size:14px">'+key+'</div><div style="font-size:12px;color:var(--sub)">预测周：'+pd.weekStart+' 起</div>';if(pd.preds)Object.keys(pd.preds).forEach(p=>{hist+=p+':'+pd.preds[p]+'分 '});hist+='<div style="font-size:13px;color:#27ae60">实际：'+pd.actual.toFixed(1)+'分 | 中奖：'+(pd.winners||[]).join('、')+'</div></div>'});
  document.getElementById('predHistory').innerHTML=hist||'<div style="text-align:center;color:var(--sub);padding:20px">还没有已揭晓的预测<br><span style="font-size:12px">周日来猜下周总分！预测保密，揭晓日才公开</span></div>';
}

async function savePredictions(){
  const data=getLocal();const today=new Date();if(!isSunday(today)){toast('只有周日才能提交预测');return}
  const monday=getMonday(today);const sunday=getSunday(monday);const nextMon=new Date(sunday);nextMon.setDate(nextMon.getDate()+1);const predKey=fmtDate(sunday);
  if(!data.predictions[predKey])data.predictions[predKey]={weekStart:fmtDate(nextMon),preds:{},actual:null,winners:[]};
  let count=0;PERSONS.forEach(p=>{const inp=document.getElementById('pred-'+p);if(inp&&inp.value!==''){data.predictions[predKey].preds[p]=parseFloat(inp.value)||0;count++}});
  const lastSun=new Date(sunday);lastSun.setDate(lastSun.getDate()-7);const lastKey=fmtDate(lastSun);const lastPred=data.predictions[lastKey];
  if(lastPred&&lastPred.actual===null){const thisMon=new Date(sunday);thisMon.setDate(thisMon.getDate()-6);const actual=getWeekAllTotal(data,thisMon);lastPred.actual=actual;if(lastPred.preds&&Object.keys(lastPred.preds).length>0){let minDiff=Infinity,winners=[];Object.keys(lastPred.preds).forEach(p=>{const diff=Math.abs(lastPred.preds[p]-actual);if(diff<minDiff){minDiff=diff;winners=[p]}else if(diff===minDiff){winners.push(p)}});lastPred.winners=winners}}
  await saveAndSync(data);toast('saved '+count+' predictions');renderPredict()
}
function getWeekAllTotal(data,monday){let total=0;PERSONS.forEach(p=>{total+=getWeekTotal(data,p,monday)});return total}
function getWeekTotal(data,person,monday){let total=0;for(let i=0;i<6;i++){const d=new Date(monday);d.setDate(d.getDate()+i);const c=getPersonCheckin(data,person,fmtDate(d));if(c)total+=(c.study||0)+(c.exercise||0)}const sun=getSunday(monday);const winnerKey=fmtDate(new Date(sun.getTime()-14*86400000));const predData=data.predictions[winnerKey];if(predData&&predData.winners&&predData.winners.includes(person)){const c=getPersonCheckin(data,person,fmtDate(sun));if(c)total+=(c.study||0)+(c.exercise||0)}return total}

// ===== HISTORY =====
function renderHistory(){const data=getLocal();let exp='';PERSONS.forEach(p=>{exp+='<div style="margin-bottom:8px"><button class="btn btn-outline btn-small" onclick="exportPerson(\''+p+'\')">'+p+'</button></div>'});exp+='<button class="btn btn-outline btn-small" onclick="exportAll()">导出全部</button>';document.getElementById('exportList').innerHTML=exp;const allDates=new Set();PERSONS.forEach(p=>{if(data.checkins[p])Object.keys(data.checkins[p]).forEach(d=>allDates.add(d))});const sorted=[...allDates].sort().reverse().slice(0,30);if(sorted.length===0){document.getElementById('historyOverview').innerHTML='<div style="text-align:center;color:var(--sub);padding:30px;font-size:14px">还没有打卡记录</div>'}else{let tbl='<table class="week-table"><thead><tr><th>日期</th>';PERSONS.forEach(p=>{tbl+='<th>'+p.slice(0,2)+'</th>'});tbl+='<th>日总</th></tr></thead><tbody>';sorted.forEach(dStr=>{tbl+='<tr><td>'+dStr.slice(5)+'</td>';let dt=0;PERSONS.forEach(p=>{const c=getPersonCheckin(data,p,dStr);const sc=c?(c.study||0)+(c.exercise||0):0;dt+=sc;tbl+='<td>'+(sc>0?sc.toFixed(1):'-')+'</td>'});tbl+='<td><strong>'+dt.toFixed(1)+'</strong></td></tr>'});tbl+='</tbody></table>';document.getElementById('historyOverview').innerHTML=tbl}}
function exportPerson(person){const data=getLocal();const records=data.checkins[person]||{};const dates=Object.keys(records).sort();let txt=person+' 打卡记录\n'+'='.repeat(40)+'\n\n';let grand=0;dates.forEach(d=>{const r=records[d];const dObj=new Date(d+'T00:00:00');const dayName=DAYS[dObj.getDay()===0?6:dObj.getDay()-1];const sc=(r.study||0)+(r.exercise||0);grand+=sc;txt+=d+' 星期'+dayName+'\n  学习：'+(r.study||0)+'分'+(r.sNote?' - '+r.sNote:'')+'\n  运动：'+(r.exercise||0)+'分'+(r.eNote?' - '+r.eNote:'')+'\n  小计：'+sc.toFixed(1)+'分\n\n'});txt+='-'.repeat(40)+'\n总计：'+grand.toFixed(1)+'分 | '+dates.length+'天\n导出：'+new Date().toLocaleString()+'\n';downloadFile(person+'_打卡记录.txt',txt)}
function exportAll(){const data=getLocal();let txt='五仁打卡汇总\n'+'='.repeat(50)+'\n\n';PERSONS.forEach(p=>{const records=data.checkins[p]||{};const dates=Object.keys(records).sort();let total=0;dates.forEach(d=>{const r=records[d];total+=(r.study||0)+(r.exercise||0)});txt+=p+'：'+total.toFixed(1)+'分 | '+dates.length+'天\n'});txt+='\n导出：'+new Date().toLocaleString()+'\n';downloadFile('五仁打卡_汇总.txt',txt)}
function downloadFile(filename,content){const blob=new Blob(['﻿'+content],{type:'text/plain;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);toast('已导出：'+filename)}

// ===== TABS =====
function switchTab(idx){document.querySelectorAll('.page').forEach((p,i)=>p.classList.toggle('active',i===idx));document.querySelectorAll('nav.tabs button').forEach((b,i)=>b.classList.toggle('active',i===idx));if(idx===0)renderCheckin();if(idx===1)renderWeekly();if(idx===2)renderPredict();if(idx===3)renderHistory()}
function renderAll(){renderCheckin();renderWeekly();renderPredict();renderHistory()}

// ===== VERSION CHECK =====
async function checkVersion(){
  try{
    const resp=await fetch('https://api.github.com/repos/'+REPO+'/contents/version.json?t='+Date.now(),{headers:{Authorization:'token '+TK,Accept:'application/vnd.github.v3+json'},cache:'no-cache'});
    if(resp.ok){const json=await resp.json();const rv=JSON.parse(decodeURIComponent(escape(atob(json.content.replace(/\s/g,''))))).version;const lv=parseInt(localStorage.getItem('wuren_ver')||'0');if(rv>lv){const b=document.createElement('div');b.id='verBanner';b.style.cssText='position:fixed;top:0;left:50%;transform:translateX(-50%);z-index:300;background:#f0883e;color:#fff;padding:10px 20px;border-radius:0 0 16px 16px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.2);animation:bounce 0.5s ease';b.textContent='New version! Click to update';b.onclick=()=>{localStorage.setItem('wuren_ver',String(rv));if('serviceWorker'in navigator){navigator.serviceWorker.getRegistrations().then(regs=>regs.forEach(r=>r.unregister()))}if('caches'in window){caches.keys().then(keys=>keys.forEach(k=>caches.delete(k)))}b.textContent='Updated!';b.style.background='#55a392';setTimeout(()=>location.reload(true),200)};document.body.appendChild(b);setTimeout(()=>{const vb=document.getElementById('verBanner');if(vb)vb.remove()},30000)}else{localStorage.setItem('wuren_ver',String(rv))}}
  }catch(e){}
}

// ===== INIT =====
async function init(){
  const sel=document.getElementById('currentUser');sel.innerHTML='<option value="">选择自己</option>'+PERSONS.map(p=>'<option value="'+p+'">'+p+'</option>').join('');
  const saved=localStorage.getItem('wuren_me');if(saved&&PERSONS.includes(saved))sel.value=saved;
  document.getElementById('checkinDate').value=fmtDate(new Date());
  await syncNow(true);renderAll();
  checkVersion();
  if('serviceWorker'in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
}
init();
